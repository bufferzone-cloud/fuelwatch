<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>FuelRadar · Zambia · before your tank runs dry</title>
    <!-- Leaflet, routing, marker cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
            overflow: hidden;
            font-size: 100%;
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            box-shadow: none;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
            overflow: hidden;
            position: relative;
        }

        /* Header with top-left driver icon, centered brand, top-right logo */
        .header {
            padding: 10px 16px 6px 16px;
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .driver-left {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }
        .driver-left img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .brand-center {
            flex: 1;
            text-align: center;
        }
        .brand-center h1 {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.3px;
        }
        .fuel-green {
            color: #16a34a;
        }
        .radar-red {
            color: #dc2626;
        }
        .slogan {
            font-size: 11px;
            font-weight: 700;
            color: #16a34a;
            background: #eef5e8;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 2px;
        }
        .logo-right {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-right img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .stats-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 11px;
            background: #f9fafb;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
        }
        .stats-row span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .road-badge, .city-badge-sm {
            background: #eef2ff;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .menu-btn {
            background: #f0fdf4;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            font-size: 18px;
            color: #16a34a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* City search row */
        .city-search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            background: #f0fdf4;
            border-radius: 40px;
            padding: 4px 4px 4px 14px;
            border: 1px solid #bbf7d0;
        }
        .city-search-row i {
            color: #16a34a;
        }
        .city-search-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 0;
            font-size: 13px;
            outline: none;
        }
        .city-search-row button {
            background: #16a34a;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
        }

        /* Custom radius slider with horizontal car icon (front right) - size increased 30% */
        .radius-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            background: #ffffff;
            padding: 4px 0;
        }
        .radius-label {
            font-size: 12px;
            font-weight: 600;
            color: #2c5e2c;
        }
        .slider-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="range"].car-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #d9f0d9;
            border-radius: 10px;
            outline: none;
        }
        input[type="range"].car-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 49px;
            height: 49px;
            background: url('driver.png') no-repeat center center;
            background-size: contain;
            cursor: pointer;
            border: none;
            transform: rotate(0deg);
            border-radius: 0;
            box-shadow: none;
            background-color: transparent;
        }
        input[type="range"].car-slider::-moz-range-thumb {
            width: 49px;
            height: 49px;
            background: url('driver.png') no-repeat center center;
            background-size: contain;
            border: none;
            border-radius: 0;
            background-color: transparent;
            transform: rotate(0deg);
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
        }

        /* search section */
        .search-section {
            padding: 6px 16px 6px 16px;
            background: white;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 30px;
            padding: 6px 14px;
            border: 1px solid rgba(0,150,0,0.25);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 4px;
            font-size: 14px;
            outline: none;
        }
        .near-me-row {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }
        .near-me-btn {
            background: #16a34a;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,80,0,0.2);
        }

        .filter-section {
            padding: 6px 16px;
            background: white;
        }
        .filter-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0;
        }
        .chip {
            background: white;
            color: #1e3a1e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: #16a34a;
            color: white;
            border-color: #14532d;
        }
        .chip-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 2px 6px;
            margin-left: 5px;
            font-size: 10px;
        }

        /* map wrapper - takes remaining space */
        .map-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            border-radius: 0;
            overflow: hidden;
            background: #cbd5e1;
            min-height: 0;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
        }
        /* Map floating buttons - bottom right group with overlay on top */
        .map-floating-buttons {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .float-btn {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 12px rgba(0,80,0,0.3);
            border: none;
            color: #16a34a;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .float-btn.clear-route {
            color: #dc2626;
            display: none;
        }
        .overlay-btn {
            background: #16a34a;
            color: white;
        }

        /* floating fuel stations pill - white icon */
        .floating-fuel-pill {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 18px rgba(0,100,0,0.4);
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .floating-fuel-pill i {
            font-size: 20px;
            color: white;
        }

        /* station card style (used in lists) - redesigned */
        .station-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 6px 14px rgba(0,60,0,0.1);
            border: 1px solid #e0f0e0;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.1s;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .station-name-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .station-name-area i {
            font-size: 20px;
            color: #16a34a;
        }
        .station-name {
            font-weight: 800;
            font-size: 16px;
            color: #0c3b1e;
        }
        .fuel-status-right {
            display: flex;
            gap: 12px;
        }
        .fuel-check {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .fuel-check i.fa-check-circle {
            color: #16a34a;
        }
        .fuel-check i.fa-times-circle {
            color: #dc2626;
        }
        .fuel-check i.fa-question-circle {
            color: #3b82f6;
        }
        .address {
            font-size: 12px;
            color: #2c4a2c;
            margin: 4px 0 6px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .distance-eta-row {
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #4b6b4b;
            margin-bottom: 8px;
        }
        .amenities-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .amenity-icon-small {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .navigate-center {
            text-align: center;
            margin-top: 8px;
        }
        .nav-btn-card {
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Modal improvements for fuel stations list */
        .modal-content {
            background: white;
            border-radius: 36px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0f0e0;
        }
        .modal-header-left img, .modal-header-right img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 800;
            color: #0c3b1e;
        }
        .modal-close {
            background: #f3f4f6;
            border: none;
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #4b5563;
        }

        /* Station detail modal specific styles */
        .station-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .station-header i {
            font-size: 32px;
            color: #16a34a;
            background: #eef5e8;
            padding: 8px;
            border-radius: 50%;
        }
        .station-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: #0c3b1e;
            margin: 0;
        }
        .location-details {
            background: #f9fafb;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .address-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #2c5e2c;
        }
        .distance-eta {
            background: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .fuel-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .fuel-item {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .fuel-name {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
        }
        .fuel-status {
            font-size: 13px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 30px;
            background: white;
        }
        .fuel-status.available { color: #16a34a; background: #e6f7e6; }
        .fuel-status.unavailable { color: #dc2626; background: #fee2e2; }
        .fuel-status.unknown { color: #3b82f6; background: #e0f2fe; }
        .fuel-price {
            font-weight: 800;
            font-size: 16px;
            color: #1f3a1f;
            margin-left: auto;
        }
        .amenities-section {
            margin: 20px 0 16px;
        }
        .amenities-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .amenities-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .amenity-badge {
            background: #f3f4f6;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1f3a1f;
            border: 1px solid #e0e7e0;
        }
        .amenity-badge i {
            color: #16a34a;
            font-size: 14px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .action-btn {
            flex: 1;
            border-radius: 40px;
            padding: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .navigate-btn {
            background: #16a34a;
            color: white;
        }
        .fav-btn {
            background: #fee2e2;
            color: #b91c1c;
        }
        .share-btn {
            background: #f3f4f6;
            color: #374151;
        }

        /* Other modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,30,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }

        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 3000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .sidebar-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.2);
            z-index: 3001;
            transition: right 0.25s ease-out;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .sidebar-overlay.open .sidebar-panel {
            right: 0;
        }
        .sidebar-logo {
            text-align: center;
            padding: 20px 0 10px 0;
        }
        .sidebar-logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
        .sidebar-header {
            padding: 12px 20px;
            border-bottom: 1px solid #e0f0e0;
            font-size: 18px;
            font-weight: 800;
            color: #16a34a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-menu {
            flex: 1;
            padding: 16px 0;
        }
        .sidebar-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #1e3a1e;
            cursor: pointer;
        }
        .sidebar-item i {
            width: 24px;
            font-size: 18px;
            color: #16a34a;
        }
        .sidebar-item:hover { background: #f0fdf4; }

        /* Form styling */
        #createAccountForm input, #loginForm input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 40px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
        }
        #createAccountForm input:focus, #loginForm input:focus {
            border-color: #16a34a;
        }

        .spinner { border: 3px solid #e2f3e2; border-top: 3px solid #16a34a; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .progress-container {
            width: 70%;
            height: 20px;
            background: #e6f0e6;
            border-radius: 60px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #16a34a;
            transition: width 0.05s linear;
        }
        .price-note {
            font-size: 9px;
            color: #6b7280;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <img src="logo.png" alt="FuelRadar" style="width:100px; margin-bottom:20px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
        <div class="progress-container"><div class="progress-bar" id="loadingBar"></div></div>
        <div id="loadingPercent" style="font-weight:800; margin-top:10px;">0%</div>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <div class="driver-left">
                    <img src="driver.png" alt="driver" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                </div>
                <div class="brand-center">
                    <h1><span class="fuel-green">Fuel</span><span class="radar-red">Radar</span></h1>
                    <div class="slogan"><i class="fas fa-gas-pump"></i> before your tank runs dry</div>
                </div>
                <div class="logo-right">
                    <img src="logo.png" alt="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                </div>
            </div>
            <div class="stats-row">
                <span><i class="fas fa-map-marker-alt"></i> <span id="stationCountHeader">0 stations</span></span>
                <span><i class="fas fa-road"></i> <span id="roadLocation" class="road-badge">road: —</span></span>
                <span><i class="fas fa-city"></i> <span id="cityDisplay" class="city-badge-sm">Lusaka</span></span>
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            </div>
            <div class="city-search-row">
                <i class="fas fa-search"></i>
                <input type="text" id="citySearchInput" placeholder="Search city (e.g. Ndola)">
                <button id="citySearchBtn">Go</button>
            </div>
            <div class="radius-row">
                <span class="radius-label"><i class="fas fa-car"></i> radius</span>
                <div class="slider-container">
                    <input type="range" min="1" max="8" step="0.5" value="3" class="car-slider" id="radiusSlider">
                </div>
                <span class="radius-value" id="radiusDisplay">3 km</span>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" style="color:#16a34a;"></i>
                <input type="text" placeholder="Search station, amenity, or filling station..." id="searchInput">
                <i class="fas fa-times clear-search" id="clearSearchBtn" style="cursor:pointer; color:#dc2626;"></i>
            </div>
            <div class="near-me-row">
                <button class="near-me-btn" id="nearMeBtn"><i class="fas fa-location-arrow"></i> Near me</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-scroll" id="filterTabs">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="available">Fuel available</button>
                <button class="chip" data-filter="petrol">Petrol</button>
                <button class="chip" data-filter="diesel">Diesel</button>
            </div>
        </div>

        <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
            <div class="map-floating-buttons">
                <button class="float-btn overlay-btn" id="overlayMapBtn"><i class="fas fa-expand-alt"></i></button>
                <button class="float-btn locate" id="floatLocateBtn"><i class="fas fa-crosshairs"></i></button>
                <button class="float-btn refresh" id="floatRefreshBtn"><i class="fas fa-sync-alt"></i></button>
                <button class="float-btn clear-route" id="clearRouteBtn"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>
    </div>

    <button class="floating-fuel-pill" id="floatingFuelBtn"><i class="fas fa-gas-pump"></i> Fuel stations <i class="fas fa-chevron-up"></i></button>

    <!-- Modals -->
    <div class="modal-overlay" id="stationModal"><div class="modal-content"><button class="modal-close" id="closeModalBtn">&times;</button><div id="modalContent"></div></div></div>
    <div class="modal-overlay" id="searchModal"><div class="modal-content"><button class="modal-close" id="closeSearchModal">&times;</button><h3><i class="fas fa-search"></i> Search station</h3><input type="text" id="searchFuelInput" placeholder="Name or amenity..." style="width:100%; padding:10px; border-radius:40px; border:1px solid #16a34a; margin-bottom:12px;"><div id="searchResultsModal" style="max-height:300px; overflow-y:auto;"></div></div></div>
    <div class="modal-overlay" id="favModal"><div class="modal-content"><button class="modal-close" id="closeFavModal">&times;</button><h3><i class="fas fa-heart" style="color:#dc2626;"></i> Favorites</h3><div id="favListModal"></div></div></div>
    <div class="modal-overlay" id="profileModal"><div class="modal-content"><button class="modal-close" id="closeProfileModal">&times;</button><div style="text-align:center;"><img src="logo.png" style="width:60px; border-radius:50%;"><h3>FuelRadar Zambia</h3><p>Demo profile</p><button id="showCreateForm" class="action-btn" style="background:#16a34a; color:white;">Create account</button><button id="showLoginForm" class="action-btn">Log in</button><div id="createAccountForm"><input placeholder="Full name"><input placeholder="Phone"><input placeholder="Email"><input type="password" placeholder="Password"><button class="action-btn navigate-btn" style="width:100%;">Register (demo)</button></div><div id="loginForm"><input placeholder="Email"><input type="password" placeholder="Password"><button class="action-btn navigate-btn" style="width:100%;">Login demo</button></div></div></div></div>
    <div class="modal-overlay" id="fuelStationsModal"><div class="modal-content" id="fuelStationsModalContent"><div id="fuelStationsListContainer"></div></div></div>

    <div id="sidebarOverlay" class="sidebar-overlay">
        <div class="sidebar-panel">
            <div class="sidebar-logo">
                <img src="logo.png" alt="FuelRadar">
            </div>
            <div class="sidebar-header">
                <span>⚡ FuelRadar</span>
                <button id="closeSidebarBtn" style="background:none; border:none; font-size:22px;">&times;</button>
            </div>
            <div class="sidebar-menu">
                <div class="sidebar-item" data-action="search"><i class="fas fa-search"></i> Search</div>
                <div class="sidebar-item" data-action="refresh"><i class="fas fa-sync-alt"></i> Refresh</div>
                <div class="sidebar-item" data-action="fav"><i class="fas fa-heart"></i> Favorites</div>
                <div class="sidebar-item" data-action="profile"><i class="fas fa-user"></i> Profile</div>
                <div class="sidebar-item" data-action="settings"><i class="fas fa-cog"></i> Settings</div>
                <div class="sidebar-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // loading animation
        let prog = 0;
        const interval = setInterval(() => {
            prog += 2;
            if (prog >= 100) { clearInterval(interval); document.getElementById('loadingOverlay').style.display = 'none'; }
            document.getElementById('loadingBar').style.width = prog + '%';
            document.getElementById('loadingPercent').innerText = prog + '%';
        }, 50);
        
        // ---------- FUEL PRICES (ERB fetch with fallback) ----------
        let currentPrices = {
            petrol: 'K28.50',
            diesel: 'K26.80',
            lpg: 'K15.00',
            cng: 'K12.50'
        };
        
        async function fetchFuelPricesFromERB() {
            try {
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.erb.org.zm'));
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                const html = data.contents;
                const petrolMatch = html.match(/Petrol[^0-9]*([0-9]+\.[0-9]+)/i);
                const dieselMatch = html.match(/Diesel[^0-9]*([0-9]+\.[0-9]+)/i);
                if (petrolMatch) currentPrices.petrol = `K${petrolMatch[1]}`;
                if (dieselMatch) currentPrices.diesel = `K${dieselMatch[1]}`;
            } catch (err) {
                console.warn('Using default prices');
            }
        }
        fetchFuelPricesFromERB();
        
        function getFuelPrice(fuelType, availability) {
            if (availability !== 'yes') return '—';
            const map = {
                petrol: currentPrices.petrol,
                diesel: currentPrices.diesel,
                lpg: currentPrices.lpg,
                cng: currentPrices.cng
            };
            return map[fuelType] || 'K?.??';
        }
        
        let stations = [];
        let userLocation = null; // user's GPS location
        let currentViewLocation = null; // location used for fetching stations (GPS or searched city)
        let currentFilter = 'all';
        let searchQuery = '';
        let radiusKm = 3;
        let map, clusterGroup, routingControl = null;
        let userMarker = null;
        let favoriteIds = JSON.parse(localStorage.getItem('fuelWatchFavs')) || [];
        let currentRoad = '—';
        
        const haversine = (lat1,lng1,lat2,lng2) => { const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLng=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); };
        const updateDistances = () => { if(currentViewLocation) stations.forEach(s => s.distance = haversine(currentViewLocation.lat, currentViewLocation.lng, s.lat, s.lon)); };
        
        function getFuelStatus(tags) { return { petrol: tags['fuel:petrol']==='yes'?'yes':(tags['fuel:petrol']==='no'?'no':null), diesel: tags['fuel:diesel']==='yes'?'yes':(tags['fuel:diesel']==='no'?'no':null), lpg: tags['fuel:lpg']==='yes'?'yes':(tags['fuel:lpg']==='no'?'no':null), cng: tags['fuel:cng']==='yes'?'yes':(tags['fuel:cng']==='no'?'no':null) }; }
        function overallStatus(fuel) { const vals=[fuel.petrol,fuel.diesel,fuel.lpg,fuel.cng].filter(v=>v!==null); if(vals.includes('yes')) return 'available'; if(vals.length && vals.every(v=>v==='no')) return 'empty'; return 'unknown'; }
        
        // Enhanced amenities extractor including tyre pump
        function extractEnhancedAmenities(tags) {
            const amenities = [];
            if (tags.shop) amenities.push({ icon: 'fa-store', name: `Shop: ${tags.shop}` });
            if (tags.pharmacy === 'yes') amenities.push({ icon: 'fa-capsules', name: 'Pharmacy' });
            if (tags.atm === 'yes' || tags.amenity === 'atm') amenities.push({ icon: 'fa-money-bill-wave', name: 'ATM' });
            if (tags.car_wash === 'yes') amenities.push({ icon: 'fa-car-wash', name: 'Car wash' });
            if (tags.amenity === 'restaurant') amenities.push({ icon: 'fa-utensils', name: 'Restaurant' });
            if (tags.amenity === 'fast_food') amenities.push({ icon: 'fa-hamburger', name: 'Fast food' });
            if (tags.toilets === 'yes') amenities.push({ icon: 'fa-restroom', name: 'Toilets' });
            if (tags['truck_parking'] === 'yes') amenities.push({ icon: 'fa-truck', name: 'Truck park' });
            if (tags['parking'] === 'yes') amenities.push({ icon: 'fa-parking', name: 'Parking' });
            // Tyre pump / compressed air detection
            if (tags['service:tyre'] === 'yes' || tags['service:tyres'] === 'yes' || tags['compressed_air'] === 'yes' || tags['amenity'] === 'compressed_air') {
                amenities.push({ icon: 'fa-fill-drip', name: 'Tyre pump / Compressed air' });
            }
            if (amenities.length === 0) amenities.push({ icon: 'fa-gas-pump', name: 'Fuel station' });
            return amenities;
        }
        
        async function fetchStations(lat,lon,rad){ const q=`[out:json];(node["amenity"="fuel"](around:${rad*1000},${lat},${lon});way["amenity"="fuel"](around:${rad*1000},${lat},${lon}););out body;`; const url=`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`; try{ const res=await fetch(url); const data=await res.json(); const mapSt=new Map(); data.elements.forEach(el=>{ let name=el.tags?.name||el.tags?.brand||"Fuel station"; let lat=el.lat||(el.center?.lat); let lon=el.lon||(el.center?.lon); if(!lat||!lon) return; const id=el.id; if(!mapSt.has(id)){ let addr=[el.tags?.['addr:housenumber'],el.tags?.['addr:street']].filter(Boolean).join(', ')||'local road'; mapSt.set(id,{ id, name, address:addr, lat, lon, tags:el.tags||{}, openingHours:el.tags?.opening_hours||'unknown', fuel:getFuelStatus(el.tags||{}), enhancedAmenities:extractEnhancedAmenities(el.tags||{}), lastUpdated:new Date().toLocaleTimeString(), favorite:favoriteIds.includes(id) }); } }); let st=Array.from(mapSt.values()); st.forEach(s=>{ s.status=overallStatus(s.fuel); }); return st; } catch(e){ return []; } }
        
        function getFilteredStations(){ let filtered=stations.slice(); if(currentFilter!=='all'){ if(currentFilter==='available') filtered=filtered.filter(s=>s.status==='available'); else filtered=filtered.filter(s=>s.fuel[currentFilter]==='yes'); } if(searchQuery.trim()){ const q=searchQuery.toLowerCase(); filtered=filtered.filter(s=>s.name.toLowerCase().includes(q)||s.address.toLowerCase().includes(q)||s.enhancedAmenities.some(a=>a.name.toLowerCase().includes(q))); } filtered.sort((a,b)=>(a.distance||999)-(b.distance||999)); return filtered; }
        
        function updateUIcounters(){ const filtered=getFilteredStations(); document.getElementById('stationCountHeader').innerHTML = `${filtered.length} stations`; const chips=document.querySelectorAll('.chip'); if(stations.length){ chips[0].innerHTML=`All <span class="chip-count">${stations.length}</span>`; chips[1].innerHTML=`Fuel available <span class="chip-count">${stations.filter(s=>s.status==='available').length}</span>`; chips[2].innerHTML=`Petrol <span class="chip-count">${stations.filter(s=>s.fuel.petrol==='yes').length}</span>`; chips[3].innerHTML=`Diesel <span class="chip-count">${stations.filter(s=>s.fuel.diesel==='yes').length}</span>`; } }
        
        function renderMarkers(){ if(!map||!clusterGroup) return; clusterGroup.clearLayers(); getFilteredStations().forEach(s=>{ const color=s.status==='available'?'#16a34a':(s.status==='empty'?'#dc2626':'#3b82f6'); const icon=L.divIcon({ html:`<i class="fas fa-gas-pump" style="color:${color}; font-size:26px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));"></i>`, iconSize:[26,26], className:'fuel-marker' }); const marker=L.marker([s.lat,s.lon],{icon}).bindPopup(`<b>${s.name}</b><br>${s.status==='available'?'✅ fuel in stock':'⚠️ '+s.status}`); marker.on('click',()=>openStationModal(s.id)); clusterGroup.addLayer(marker); }); }
        
        async function loadStations(showToast=true, location=currentViewLocation){ if(!location) return; if(showToast) document.getElementById('nearMeBtn').innerHTML='<span class="spinner"></span> loading'; stations=await fetchStations(location.lat,location.lng,radiusKm); updateDistances(); renderMarkers(); updateUIcounters(); if(showToast) document.getElementById('nearMeBtn').innerHTML='<i class="fas fa-location-arrow"></i> Near me'; }
        
        function toggleFavorite(id){ const s=stations.find(s=>s.id===id); if(s){ s.favorite=!s.favorite; if(s.favorite){ if(!favoriteIds.includes(id)) favoriteIds.push(id); } else favoriteIds=favoriteIds.filter(fid=>fid!==id); localStorage.setItem('fuelWatchFavs',JSON.stringify(favoriteIds)); renderMarkers(); updateUIcounters(); if(document.getElementById('stationModal').classList.contains('show')) openStationModal(id); } }
        
        function openStationModal(id){
            const s = stations.find(s => s.id === id);
            if (!s) return;
            const distance = s.distance ? s.distance.toFixed(1) : '?';
            const eta = s.distance ? Math.round(s.distance / 40 * 60) : '?';
            const etaText = eta !== '?' ? `${eta} min` : '—';
            
            const fuelTypes = ['petrol', 'diesel', 'lpg', 'cng'];
            const fuelItemsHtml = fuelTypes.map(f => {
                const status = s.fuel[f];
                let statusClass = '', statusText = '', icon = '';
                if (status === 'yes') {
                    statusClass = 'available';
                    statusText = 'Available';
                    icon = '<i class="fas fa-check-circle"></i>';
                } else if (status === 'no') {
                    statusClass = 'unavailable';
                    statusText = 'Unavailable';
                    icon = '<i class="fas fa-times-circle"></i>';
                } else {
                    statusClass = 'unknown';
                    statusText = 'Unknown';
                    icon = '<i class="fas fa-question-circle"></i>';
                }
                const price = getFuelPrice(f, status);
                return `
                    <div class="fuel-item">
                        <div class="fuel-name"><i class="fas fa-gas-pump"></i> ${f.toUpperCase()}</div>
                        <div><span class="fuel-status ${statusClass}">${icon} ${statusText}</span></div>
                        <div class="fuel-price">${price}</div>
                    </div>
                `;
            }).join('');
            
            const amenities = s.enhancedAmenities || [];
            const amenitiesHtml = amenities.length ? `
                <div class="amenities-section">
                    <div class="amenities-title"><i class="fas fa-concierge-bell"></i> Amenities & Services</div>
                    <div class="amenities-grid">
                        ${amenities.map(a => `<span class="amenity-badge"><i class="fas ${a.icon}"></i> ${a.name}</span>`).join('')}
                    </div>
                </div>
            ` : '<div class="amenities-section"><div class="amenities-title">No additional services reported</div></div>';
            
            const modalHtml = `
                <div class="station-header">
                    <i class="fas fa-gas-pump"></i>
                    <h2>${s.name}</h2>
                </div>
                <div class="location-details">
                    <div class="address-detail">
                        <i class="fas fa-map-marker-alt"></i> ${s.address}
                    </div>
                    <div class="distance-eta">
                        <i class="fas fa-route"></i> ${distance} km · <i class="far fa-clock"></i> ${etaText}
                    </div>
                </div>
                <div class="fuel-grid">
                    ${fuelItemsHtml}
                </div>
                ${amenitiesHtml}
                <div class="action-buttons">
                    <button class="action-btn navigate-btn" id="modalNav"><i class="fas fa-route"></i> Navigate</button>
                    <button class="action-btn fav-btn" id="modalFav"><i class="${s.favorite ? 'fas' : 'far'} fa-heart"></i> ${s.favorite ? 'Saved' : 'Save'}</button>
                    <button class="action-btn share-btn" id="modalShare"><i class="fas fa-share-alt"></i> Share</button>
                </div>
                <div class="price-note">Prices estimated from ERB Zambia · last sync: ${s.lastUpdated}</div>
            `;
            document.getElementById('modalContent').innerHTML = modalHtml;
            document.getElementById('modalNav').onclick = () => startNavigation(s.lat, s.lon, s.name);
            document.getElementById('modalFav').onclick = () => toggleFavorite(s.id);
            document.getElementById('modalShare').onclick = () => navigator.share?.({ title: s.name, text: `Check ${s.name} on FuelRadar` }) || alert('Share demo');
            document.getElementById('stationModal').classList.add('show');
        }
        
        function startNavigation(destLat,destLon,name){ document.getElementById('stationModal').classList.remove('show'); if(!userLocation) { alert('Your current location needed for navigation'); return; } if(routingControl) map.removeControl(routingControl); routingControl=L.Routing.control({ waypoints:[L.latLng(userLocation.lat,userLocation.lng),L.latLng(destLat,destLon)], routeWhileDragging:false, fitSelectedRoutes:true, lineOptions:{styles:[{color:'#16a34a',weight:5}]} }).addTo(map); document.getElementById('clearRouteBtn').style.display='flex'; }
        
        async function reverseGeocodeRoad(lat,lng){ try{ const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`); const data=await res.json(); const road=data.address?.road||data.address?.pedestrian||data.address?.suburb||'local road'; currentRoad=road; document.getElementById('roadLocation').innerHTML=`${road.substring(0,28)}`; } catch(e){ currentRoad='unknown road'; document.getElementById('roadLocation').innerHTML=`approx road`; } }
        
        async function updateCityName(lat,lng){ try{ const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`); const data=await res.json(); const city=data.address?.city||data.address?.town||data.address?.village||'Zambia'; document.getElementById('cityDisplay').innerHTML=`${city}`; await reverseGeocodeRoad(lat,lng); } catch(e){ document.getElementById('cityDisplay').innerHTML=`Lusaka`; } }
        
        function locateAndFetch(){ if(!navigator.geolocation) return; navigator.geolocation.getCurrentPosition(async pos=>{ userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude}; currentViewLocation = userLocation; if(userMarker) map.removeLayer(userMarker); userMarker=L.circleMarker([userLocation.lat,userLocation.lng],{radius:6,color:'#16a34a',fillColor:'#16a34a',fillOpacity:0.9}).addTo(map).bindPopup('You').openPopup(); map.setView([userLocation.lat,userLocation.lng],14); await updateCityName(userLocation.lat,userLocation.lng); await loadStations(true); }, err=>{ console.warn('Geolocation error:', err); // fallback to default city (Lusaka)
            const defaultLat = -15.3875, defaultLng = 28.3228; // Lusaka coordinates
            userLocation = null; // no user location for navigation
            currentViewLocation = { lat: defaultLat, lng: defaultLng };
            map.setView([defaultLat, defaultLng], 12);
            updateCityName(defaultLat, defaultLng);
            loadStations(true);
        }, {enableHighAccuracy:true}); }
        
        // City search: center map, fetch stations at that location
        async function searchCityAndLoadStations(query) {
            if (!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query+', Zambia')}&limit=1`);
                const data = await res.json();
                if (data.length) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    map.setView([lat, lon], 12);
                    currentViewLocation = { lat, lon };
                    await loadStations(true);
                    await updateCityName(lat, lon);
                } else {
                    alert('City not found');
                }
            } catch(e) {
                alert('Geocoding error');
            }
        }
        
        // Show fuel stations modal with redesigned cards including tyre pump
        function showFuelStationsList() {
            const sorted = getFilteredStations();
            const container = document.getElementById('fuelStationsListContainer');
            if (!sorted.length) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">No stations found</p>';
            } else {
                container.innerHTML = `
                    <div class="modal-header">
                        <div class="modal-header-left"><img src="driver.png" alt="driver"></div>
                        <h3>Fuel Stations</h3>
                        <div class="modal-header-right"><img src="logo.png" alt="logo"></div>
                    </div>
                    <div id="fuelStationsList" style="max-height: 65vh; overflow-y: auto;"></div>
                `;
                const listDiv = document.getElementById('fuelStationsList');
                listDiv.innerHTML = sorted.map(s => {
                    const distance = s.distance ? s.distance.toFixed(1) : '?';
                    const eta = s.distance ? Math.round(s.distance / 40 * 60) : '?';
                    const etaText = eta !== '?' ? `${eta} min` : '—';
                    const petrolAvailable = s.fuel.petrol === 'yes';
                    const dieselAvailable = s.fuel.diesel === 'yes';
                    const hasTyrePump = s.enhancedAmenities.some(a => a.name.toLowerCase().includes('tyre') || a.name.toLowerCase().includes('compressed'));
                    const tyreIcon = hasTyrePump ? '<span class="amenity-icon-small"><i class="fas fa-fill-drip"></i> Tyre pump</span>' : '';
                    return `
                        <div class="station-card" data-id="${s.id}">
                            <div class="card-header">
                                <div class="station-name-area">
                                    <i class="fas fa-gas-pump"></i>
                                    <span class="station-name">${s.name}</span>
                                </div>
                                <div class="fuel-status-right">
                                    <div class="fuel-check"><i class="fas ${petrolAvailable ? 'fa-check-circle' : (s.fuel.petrol === 'no' ? 'fa-times-circle' : 'fa-question-circle')}"></i> Petrol</div>
                                    <div class="fuel-check"><i class="fas ${dieselAvailable ? 'fa-check-circle' : (s.fuel.diesel === 'no' ? 'fa-times-circle' : 'fa-question-circle')}"></i> Diesel</div>
                                </div>
                            </div>
                            <div class="address"><i class="fas fa-road"></i> ${s.address}</div>
                            <div class="distance-eta-row">
                                <span><i class="fas fa-route"></i> ${distance} km</span>
                                <span><i class="far fa-clock"></i> ${etaText}</span>
                            </div>
                            ${tyreIcon ? `<div class="amenities-inline">${tyreIcon}</div>` : ''}
                            <div class="navigate-center">
                                <button class="nav-btn-card" data-nav-id="${s.id}"><i class="fas fa-route"></i> Navigate</button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                document.querySelectorAll('#fuelStationsList .station-card').forEach(card => {
                    const cardId = parseInt(card.dataset.id);
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.nav-btn-card')) return;
                        openStationModal(cardId);
                        document.getElementById('fuelStationsModal').classList.remove('show');
                    });
                });
                document.querySelectorAll('#fuelStationsList .nav-btn-card').forEach(btn => {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.navId);
                        const station = stations.find(x => x.id === id);
                        if (station && userLocation) {
                            document.getElementById('fuelStationsModal').classList.remove('show');
                            startNavigation(station.lat, station.lon, station.name);
                        } else {
                            alert('Location not ready. Use "Near me" first.');
                        }
                    };
                });
            }
            document.getElementById('fuelStationsModal').classList.add('show');
        }
        
        function initMap(){
            map = L.map('map', { zoomControl: false }).setView([-13.133,27.849],6);
            // Use standard OpenStreetMap tiles for reliability
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);
            clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
            map.addLayer(clusterGroup);
        }
        
        // sidebar
        const sidebar=document.getElementById('sidebarOverlay');
        document.getElementById('menuBtn').onclick=()=>sidebar.classList.add('open');
        document.getElementById('closeSidebarBtn').onclick=()=>sidebar.classList.remove('open');
        sidebar.addEventListener('click',e=>{ if(e.target===sidebar) sidebar.classList.remove('open'); });
        document.querySelectorAll('.sidebar-item').forEach(item=>{ item.onclick=()=>{ const act=item.dataset.action; sidebar.classList.remove('open'); if(act==='search') document.getElementById('searchModal').classList.add('show'); if(act==='refresh'){ if(currentViewLocation) loadStations(true); else locateAndFetch(); } if(act==='fav'){ document.getElementById('favModal').classList.add('show'); const favStations=stations.filter(s=>favoriteIds.includes(s.id)); document.getElementById('favListModal').innerHTML=favStations.length?favStations.map(s=>`<div class="station-card" data-id="${s.id}"><strong>${s.name}</strong> ${s.distance?.toFixed(1)}km <button class="nav-btn-sm" data-nav-id="${s.id}">Navigate</button><button class="action-btn" style="background:#fee2e2; margin-left:8px;" data-id="${s.id}">remove</button></div>`).join(''):'<p>No favorites</p>'; document.querySelectorAll('#favListModal .station-card').forEach(c=>c.addEventListener('click',e=>{ if(!e.target.closest('button')) openStationModal(parseInt(c.dataset.id)); })); document.querySelectorAll('#favListModal .nav-btn-sm').forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); const id=parseInt(btn.dataset.navId); const st=stations.find(x=>x.id===id); if(st&&userLocation) startNavigation(st.lat,st.lon,st.name); }); document.querySelectorAll('#favListModal .action-btn').forEach(btn=>btn.onclick=()=>toggleFavorite(parseInt(btn.dataset.id))); } if(act==='profile') document.getElementById('profileModal').classList.add('show'); if(act==='settings') alert('⚙️ Settings: units, theme (demo)'); if(act==='logout') alert('Logged out (demo)'); }; });
        
        // Event listeners
        document.getElementById('nearMeBtn').onclick=locateAndFetch;
        document.getElementById('floatLocateBtn').onclick=()=>{ if(userLocation) map.setView([userLocation.lat,userLocation.lng],15); else locateAndFetch(); };
        document.getElementById('floatRefreshBtn').onclick=()=>{ if(currentViewLocation) loadStations(true); };
        document.getElementById('radiusSlider').oninput=(e)=>{ radiusKm=parseFloat(e.target.value); document.getElementById('radiusDisplay').innerText=radiusKm+' km'; if(currentViewLocation) loadStations(false); };
        document.getElementById('searchInput').oninput=(e)=>{ searchQuery=e.target.value; renderMarkers(); updateUIcounters(); };
        document.getElementById('clearSearchBtn').onclick=()=>{ document.getElementById('searchInput').value=''; searchQuery=''; renderMarkers(); updateUIcounters(); };
        document.querySelectorAll('.chip').forEach(chip=>{ chip.onclick=()=>{ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); currentFilter=chip.dataset.filter; renderMarkers(); updateUIcounters(); }; });
        document.getElementById('citySearchBtn').onclick=async()=>{ const q=document.getElementById('citySearchInput').value; if(q) await searchCityAndLoadStations(q); };
        document.getElementById('overlayMapBtn').onclick=()=>{ const wrap=document.getElementById('mapWrapper'); if(wrap.requestFullscreen) wrap.requestFullscreen(); else if(wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen(); };
        document.getElementById('clearRouteBtn').onclick=()=>{ if(routingControl){ map.removeControl(routingControl); routingControl=null; document.getElementById('clearRouteBtn').style.display='none'; } };
        document.getElementById('floatingFuelBtn').onclick=showFuelStationsList;
        document.getElementById('closeFuelStationsBtn').onclick=()=>document.getElementById('fuelStationsModal').classList.remove('show');
        document.getElementById('closeModalBtn').onclick=()=>document.getElementById('stationModal').classList.remove('show');
        document.getElementById('closeSearchModal').onclick=()=>document.getElementById('searchModal').classList.remove('show');
        document.getElementById('closeFavModal').onclick=()=>document.getElementById('favModal').classList.remove('show');
        document.getElementById('closeProfileModal').onclick=()=>document.getElementById('profileModal').classList.remove('show');
        document.getElementById('searchFuelInput').addEventListener('input',e=>{ const val=e.target.value; const filtered=stations.filter(s=>s.name.toLowerCase().includes(val.toLowerCase())||s.address.toLowerCase().includes(val.toLowerCase())||s.enhancedAmenities.some(a=>a.name.toLowerCase().includes(val.toLowerCase()))).slice(0,15); document.getElementById('searchResultsModal').innerHTML=filtered.map(s=>`<div class="station-card" data-id="${s.id}"><div style="display:flex; justify-content:space-between;"><strong>${s.name}</strong> <span>${s.distance?.toFixed(1)} km</span></div><div>${s.address}</div><button class="nav-btn-sm" data-nav-id="${s.id}">Navigate</button></div>`).join(''); document.querySelectorAll('#searchResultsModal .station-card').forEach(c=>{ c.addEventListener('click',(e)=>{ if(e.target.closest('.nav-btn-sm')) return; openStationModal(parseInt(c.dataset.id)); document.getElementById('searchModal').classList.remove('show'); }); }); document.querySelectorAll('#searchResultsModal .nav-btn-sm').forEach(btn=>{ btn.onclick=e=>{ e.stopPropagation(); const id=parseInt(btn.dataset.navId); const st=stations.find(x=>x.id===id); if(st&&userLocation) startNavigation(st.lat,st.lon,st.name); else alert('location not ready'); }; }); });
        document.getElementById('showCreateForm').onclick=()=>{ document.getElementById('createAccountForm').style.display='block'; document.getElementById('loginForm').style.display='none'; };
        document.getElementById('showLoginForm').onclick=()=>{ document.getElementById('loginForm').style.display='block'; document.getElementById('createAccountForm').style.display='none'; };
        
        initMap();
        locateAndFetch(); // initial GPS fetch with fallback
    })();
    </script>
</body>
</html>
