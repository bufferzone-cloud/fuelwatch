    <style>
        /* ----- FULL FLAT, SCALED DOWN 15% (EXCEPT BOTTOM NAV) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
            overflow: hidden;
            font-size: 93.5%; /* 15% reduction from 110% ~ 93.5% */
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            overflow: hidden;
        }

        /* header scaled */
        .header {
            padding: 10px 14px 6px 14px;  /* reduced from 12/16/8 */
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-img {
            height: 34px;   /* reduced from 40 */
            width: auto;
            border-radius: 10px;
            background: white;
            padding: 3px;
            box-shadow: 0 4px 8px rgba(0,150,0,0.25);
            object-fit: contain;
        }
        .header-text {
            flex: 1;
            text-align: center;
        }
        .header-text h1 {
            font-size: 18px;  /* reduced from 20 */
            font-weight: 800;
            color: #0a2a1f;
        }
        .city-badge {
            background: #dcfce7;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 11px;  /* scaled */
            font-weight: 700;
            color: #166534;
            border: 1px solid #86efac;
            white-space: nowrap;
        }
        .header-text p {
            font-size: 11px;
            color: #2c3e2c;
            margin-top: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .live-badge { display: none; } /* removed LIVE ZAMBIA */

        /* --- custom road slider (car icon, dotted line) --- */
        .radius-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 2px;
            position: relative;
        }
        .road-slider-container {
            flex: 1;
            position: relative;
            height: 32px;
            cursor: pointer;
        }
        .road-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            border-bottom: 2px dotted #2e7d32;  /* dotted road */
            transform: translateY(-50%);
            pointer-events: none;
        }
        .car-icon-slider {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;  /* car size */
            color: #16a34a;
            filter: drop-shadow(0 4px 4px rgba(0,60,0,0.3));
            pointer-events: none;
            transition: left 0.05s ease;
            z-index: 3;
        }
        .car-icon-slider i {
            transform: scaleX(1); /* facing right */
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            z-index: 2;
        }
        #radiusSlider { display: none; } /* hidden actual range */

        /* search / filter sections scaled */
        .search-section { padding: 6px 14px 6px 14px; background: white; }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 30px;
            padding: 5px 12px;
            border: 1px solid rgba(0,150,0,0.25);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 4px;
            font-size: 13px;
            outline: none;
        }
        .sort-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .sort-row select {
            flex: 1;
            background: white;
            border: 1px solid #bbf7d0;
            border-radius: 30px;
            padding: 7px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #14532d;
        }
        .near-me-btn {
            background: #16a34a;
            border: none;
            border-radius: 30px;
            padding: 7px 14px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .filter-section { padding: 6px 14px; background: white; }

            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 2px 0;

        .chip {

        .map-wrapper {

        .action-btn { border-radius: 40px; padding: 12px 16px; font-weight: 700; border: none; cursor: pointer; background: #f8fafc; font-size: 13px; }
        .navigate-btn { background: #16a34a; color: white; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* LOADING OVERLAY — pulsing logo + move to corner */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .loading-logo {
            width: 160px;

            margin-bottom: 30px;
            border-radius: 24px;
            background: white;
            padding: 12px;

            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; box-shadow: 0 20px 40px rgba(0,150,0,0.5); }
            100% { transform: scale(1); opacity: 1; }
        }
        /* corner position (top left) small */
        .loading-logo.corner {
            width: 48px;
            height: auto;
            position: fixed;
            top: 16px;
            left: 16px;
            transform: translate(0, 0);
            animation: none;
            margin: 0;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 4px 8px rgba(0,80,0,0.3);
        }
        #loadingOverlay.hide {
            background: transparent;
            backdrop-filter: none;
            pointer-events: none;
        }
        #loadingOverlay.hide .loading-logo {
            width: 48px;
            top: 16px;
            left: 16px;
            transform: translate(0, 0);
            animation: none;
            box-shadow: 0 4px 8px rgba(0,80,0,0.3);
        }
        #loadingOverlay.hide .loading-logo {
            position: fixed;
        }
        /* progress bar removed */
    </style>

    <script>
    (function() {
        // ---------- LOADING OVERLAY (pulse 5s then move to corner) ----------
        const overlay = document.getElementById('loadingOverlay');
        const logo = document.getElementById('pulsingLogo');
        setTimeout(() => {
            overlay.classList.add('hide');
            logo.classList.add('corner');
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 800);
        }, 5000); // 5 sec pulse then move

        // ---------- APP STATE ----------
        let stations = [];
        let userLocation = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let sortBy = 'distance';
        let radiusKm = 3;
        let map, clusterGroup, routingControl = null;
        let currentModalId = null;
        let userMarker = null;
        const cityCache = new Map();
        let favoriteIds = JSON.parse(localStorage.getItem('fuelWatchFavs')) || [];

        // utils
        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const updateDistances = () => {
            if (!userLocation) return;
            stations.forEach(s => { s.distance = haversine(userLocation.lat, userLocation.lng, s.lat, s.lon); });
        };

        function isOpenNow(openingHours) {
            if (!openingHours || openingHours === 'unknown') return null;
            const oh = openingHours.toLowerCase();
            if (oh.includes('24/7') || oh.includes('24 7')) return true;
            return null;
        }

        function getPhotoUrl(tags) {
            if (tags.image) return tags.image;
            if (tags.wikimedia_commons) {
                let file = tags.wikimedia_commons.replace(/^File:/, '');
                return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}?width=300`;
            }
            if (tags.photo) return tags.photo;
            return null;
        }

        function getFuelStatus(tags) {
            const fuel = { petrol: null, diesel: null, lpg: null, cng: null };
            if (tags['fuel:petrol'] === 'yes' || tags['fuel:petrol'] === '24/7') fuel.petrol = 'yes';
            else if (tags['fuel:petrol'] === 'no') fuel.petrol = 'no';
            if (tags['fuel:diesel'] === 'yes' || tags['fuel:diesel'] === '24/7') fuel.diesel = 'yes';
            else if (tags['fuel:diesel'] === 'no') fuel.diesel = 'no';
            if (tags['fuel:lpg'] === 'yes') fuel.lpg = 'yes';
            else if (tags['fuel:lpg'] === 'no') fuel.lpg = 'no';
            if (tags['fuel:cng'] === 'yes') fuel.cng = 'yes';
            else if (tags['fuel:cng'] === 'no') fuel.cng = 'no';
            return fuel;
        }

        function overallStatus(fuel) {
            const values = [fuel.petrol, fuel.diesel, fuel.lpg, fuel.cng].filter(v => v !== null);
            if (values.includes('yes')) return 'available';
            if (values.length > 0 && values.every(v => v === 'no')) return 'empty';
            return 'unknown';
        }

        function extractAmenities(tags) {
            let amenities = [];
            const getName = (type, defaultName) => {
                if (tags[type + ':name']) return tags[type + ':name'].trim();
                if (tags.brand) return tags.brand.trim();
                if (tags.operator) return tags.operator.trim();
                if (tags.shop) return tags.shop.replace(/_/g, ' ');
                return defaultName;
            };
            if (tags.shop) amenities.push(`🛒 Shop: ${getName('shop', tags.shop)}`);
            if (tags.pharmacy) amenities.push(`💊 Pharmacy: ${getName('pharmacy', 'Pharmacy')}`);
            if (tags.atm === 'yes' || tags.amenity === 'atm') amenities.push(`🏧 ATM`);
            if (tags.car_wash === 'yes' || tags.amenity === 'car_wash') amenities.push(`🧼 Car wash`);
            if (tags.amenity === 'restaurant' || tags.amenity === 'fast_food') amenities.push(`🍽️ ${tags.amenity === 'restaurant' ? 'Restaurant' : 'Fast food'}`);
            if (tags.amenity === 'cafe') amenities.push(`☕ Cafe`);
            if (tags.toilets === 'yes' || tags.amenity === 'toilets') amenities.push(`🚻 Toilets`);
            return [...new Set(amenities)];
        }

        async function fetchStations(lat, lon, radius) {
            const query = `[out:json];(node["amenity"="fuel"](around:${radius*1000},${lat},${lon});way["amenity"="fuel"](around:${radius*1000},${lat},${lon}););out body;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const elements = data.elements;
                const stationMap = new Map();
                elements.forEach(el => {
                    let name = el.tags?.name || el.tags?.brand || "Fuel station";
                    let lat = el.lat || (el.center && el.center.lat);
                    let lon = el.lon || (el.center && el.center.lon);
                    if (!lat || !lon) return;
                    const id = el.id;
                    if (!stationMap.has(id)) {
                        let addr = [];
                        if (el.tags?.['addr:housenumber']) addr.push(el.tags['addr:housenumber']);
                        if (el.tags?.['addr:street']) addr.push(el.tags['addr:street']);
                        if (el.tags?.['addr:city']) addr.push(el.tags['addr:city']);
                        let address = addr.join(', ') || 'local road';
                        let openingHours = el.tags?.opening_hours || (el.tags?.['24/7'] ? '24/7' : 'unknown');
                        stationMap.set(id, {
                            id, name, address, lat, lon,
                            tags: el.tags || {},
                            openingHours,
                            fuel: getFuelStatus(el.tags || {}),
                            amenities: extractAmenities(el.tags || {}),
                            photoUrl: getPhotoUrl(el.tags || {}),
                            lastUpdated: new Date().toLocaleTimeString() + ' (OSM)',
                            favorite: favoriteIds.includes(id)
                        });
                    }
                });
                let newStations = Array.from(stationMap.values()).map(s => {
                    s.status = overallStatus(s.fuel);
                    if (s.amenities.length === 0) s.amenities.push('⛽ Fuel station');
                    return s;
                });
                return newStations;
            } catch (e) {
                console.warn("Overpass error", e);
                return [];
            }
        }

        function getIconForStatus(status) {
            let color = (status === 'available') ? '#16a34a' : (status === 'empty' ? '#dc2626' : '#3b82f6');
            return L.divIcon({
                html: `<i class="fas fa-gas-pump" style="color: ${color}; font-size: 24px; filter: drop-shadow(0 2px 4px #00000040);"></i>`,
                iconSize: [28, 28],
                className: 'fuel-marker'
            });
        }

        async function loadStations(showSpinner = true) {
            if (!userLocation) return;
            if (showSpinner) document.getElementById('nearMeBtn').innerHTML = '<span class="spinner"></span> loading';
            stations = await fetchStations(userLocation.lat, userLocation.lng, radiusKm);
            updateDistances();
            renderMarkers();
            updateFilterCounts();
            if (showSpinner) document.getElementById('nearMeBtn').innerHTML = '<i class="fas fa-location-arrow"></i> Near me';
        }

        function renderMarkers() {
            if (!map || !clusterGroup) return;
            clusterGroup.clearLayers();
            stations.forEach(s => {
                const marker = L.marker([s.lat, s.lon], { icon: getIconForStatus(s.status) })
                    .bindPopup(`<b>${s.name}</b><br>${s.status==='available'?'✅ fuel':'⛔ no fuel'}`);
                marker.on('click', () => openModal(s.id));
                clusterGroup.addLayer(marker);
            });
        }

        function updateFilterCounts() {
            const total = stations.length;
            const available = stations.filter(s => s.status === 'available').length;
            const petrol = stations.filter(s => s.fuel.petrol === 'yes').length;
            const diesel = stations.filter(s => s.fuel.diesel === 'yes').length;
            const chips = document.querySelectorAll('.chip');
            chips[0].innerHTML = `All <span class="chip-count">${total}</span>`;
            chips[1].innerHTML = `Fuel available <span class="chip-count">${available}</span>`;
            chips[2].innerHTML = `Petrol <span class="chip-count">${petrol}</span>`;
            chips[3].innerHTML = `Diesel <span class="chip-count">${diesel}</span>`;
        }

        function getFilteredStations() {
            let filtered = stations.slice();
            if (currentFilter !== 'all') {
                if (currentFilter === 'available') filtered = filtered.filter(s => s.status === 'available');
                else filtered = filtered.filter(s => s.fuel[currentFilter] === 'yes');
            }
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(s => s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q) || s.amenities.some(a => a.toLowerCase().includes(q)));
            }
            filtered.sort((a,b) => (sortBy === 'distance' ? (a.distance||999)-(b.distance||999) : a.name.localeCompare(b.name)));
            return filtered;
        }

        // car slider logic
        const range = document.getElementById('radiusSlider');
        const carIcon = document.getElementById('carSliderIcon');
        const roadDiv = document.getElementById('roadSliderClick');
        const radiusDisplay = document.getElementById('radiusDisplay');
        function updateCarPosition(value) {
            const percent = ((value - 1) / (8 - 1)) * 100; // min1 max8
            carIcon.style.left = percent + '%';
            radiusDisplay.innerText = value + ' km';
        }
        range.addEventListener('input', (e) => {
            radiusKm = parseFloat(e.target.value);
            updateCarPosition(radiusKm);
            if (userLocation) loadStations(false);
        });
        roadDiv.addEventListener('click', (e) => {
            const rect = roadDiv.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = Math.min(1, Math.max(0, x / rect.width));
            const newVal = 1 + percent * (8 - 1);
            const stepped = Math.round(newVal * 2) / 2; // step 0.5
            range.value = stepped;
            radiusKm = stepped;
            updateCarPosition(stepped);
            if (userLocation) loadStations(false);
        });
        updateCarPosition(3);

        // reverse geocode with road/area/city
        async function updateCityAreaRoad(lat, lon) {
            const key = `${lat.toFixed(3)},${lon.toFixed(3)}`;
            if (cityCache.has(key)) {
                document.getElementById('cityDisplay').innerHTML = `<i class="fas fa-map-pin"></i> ${cityCache.get(key)}`;
                return;
            }
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const data = await res.json();
                const addr = data.address || {};
                const city = addr.city || addr.town || addr.village || addr.county || 'Zambia';
                const road = addr.road || '';
                const suburb = addr.suburb || addr.neighbourhood || '';
                let areaStr = suburb ? suburb + (road ? ', ' : '') : '';
                areaStr += road;
                document.getElementById('cityDisplay').innerHTML = `<i class="fas fa-map-pin"></i> ${city}`;
                document.getElementById('streetDisplay').innerText = areaStr ? ` · ${areaStr}` : '';
                cityCache.set(key, city);
            } catch { document.getElementById('cityDisplay').innerHTML = `<i class="fas fa-map-pin"></i> Lusaka`; }
        }

        // locate with persistent permission
        function locateAndFetch(forcePrompt = false) {
            if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
            document.getElementById('userLocationStatus')?.remove(); // not used
            navigator.geolocation.getCurrentPosition(async (pos) => {
                userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
                    radius: 7, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 0.9, weight: 2
                }).addTo(map).bindPopup('You are here').openPopup();
                map.setView([userLocation.lat, userLocation.lng], 13);
                updateCityAreaRoad(userLocation.lat, userLocation.lng);
                await loadStations(true);
            }, (err) => {
                if (err.code === 1) console.log('permission denied');
                else alert('Location error: ' + err.message);
                document.getElementById('nearMeBtn').innerHTML = '<i class="fas fa-location-arrow"></i> Near me';
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        // open all stations modal
        function showAllStationsModal() {
            const filtered = getFilteredStations();
            const container = document.getElementById('allStationsList');
            if (!stations.length) container.innerHTML = '<p>No stations yet. Enable location.</p>';
            else {
                container.innerHTML = filtered.map(s => {
                    const open = isOpenNow(s.openingHours);
                    const openText = open === true ? '<span style="color:#16a34a;">● Open</span>' : (open === false ? '<span style="color:#a16207;">● Closed</span>' : '<span>⏳ unknown</span>');
                    const eta = s.distance ? Math.round(s.distance / 40 * 60) : '?';
                    return `<div class="station-card" style="padding:14px; margin-bottom:12px; cursor:pointer; border-radius:20px; box-shadow:0 6px 12px rgba(0,60,0,0.1);" data-id="${s.id}">
                        <div style="display:flex; justify-content:space-between;"><strong>${s.name}</strong> ${openText}</div>
                        <div style="font-size:12px; color:#2c4a2c;"><i class="fas fa-route"></i> ${s.distance?.toFixed(1)} km · 🕒 ~${eta} min</div>
                        <div style="font-size:11px; margin-top:6px;">${s.amenities.slice(0,3).join(' · ')}</div>
                        <button class="action-btn navigate-btn" style="margin-top:8px; padding:8px; width:100%;" data-id="${s.id}"><i class="fas fa-directions"></i> Directions</button>
                    </div>`;
                }).join('');
                container.querySelectorAll('.station-card, .navigate-btn').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const card = e.target.closest('.station-card') || e.target.closest('.navigate-btn');
                        const id = parseInt(card.dataset.id);
                        document.getElementById('allStationsModal').classList.remove('show');
                        const station = stations.find(s => s.id === id);
                        if (station) startNavigation(station.lat, station.lon, station.name);
                    });
                });
            }
            document.getElementById('allStationsModal').classList.add('show');
        }

        function startNavigation(destLat, destLon, destName) {
            if (!userLocation) { alert('Location not available'); return; }
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLocation.lat, userLocation.lng), L.latLng(destLat, destLon)],
                routeWhileDragging: false,
                fitSelectedRoutes: true,
                lineOptions: { styles: [{ color: '#16a34a', weight: 5 }] }
            }).addTo(map);
            document.getElementById('clearRouteBtn').style.display = 'flex';
        }

        function openModal(id) { /* (keep existing openModal, but ensure navigation) */ 
            const s = stations.find(s => s.id === id);
            if (!s) return;
            currentModalId = id;
            const fuelRows = ['petrol','diesel','lpg','cng'].map(f => `<div style="display:flex; justify-content:space-between;"><span>${f.toUpperCase()}</span> <strong>${s.fuel[f] === 'yes' ? '✅' : (s.fuel[f] === 'no' ? '❌' : '❓')}</strong></div>`).join('');
            const photoHtml = s.photoUrl ? `<img src="${s.photoUrl}" class="station-photo">` : `<div class="station-photo" style="background:#cbd5e1; display:flex; align-items:center; justify-content:center;"><i class="fas fa-gas-pump" style="font-size:32px;"></i></div>`;
            const modalHtml = `
                <h2>${s.name}</h2>
                <p><i class="fas fa-map-pin"></i> ${s.address} (${s.distance?.toFixed(1)} km)</p>
                ${photoHtml}
                <div class="fuel-list">${fuelRows}</div>
                <div>${s.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join(' ')}</div>
                <div style="display:flex; gap:8px; margin-top:16px;">
                    <button class="action-btn navigate-btn" id="modalNav"><i class="fas fa-route"></i> Navigate</button>
                    <button class="action-btn" id="modalFav"><i class="${s.favorite ? 'fas' : 'far'} fa-heart"></i> Fav</button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = modalHtml;
            document.getElementById('modalNav').addEventListener('click', () => startNavigation(s.lat, s.lon, s.name));
            document.getElementById('modalFav').addEventListener('click', () => toggleFavorite(s.id));
            document.getElementById('stationModal').classList.add('show');
        }

        function toggleFavorite(id) { /* same */ 
            const s = stations.find(s => s.id === id);
            if (s) { s.favorite = !s.favorite; 
                if (s.favorite) { if (!favoriteIds.includes(id)) favoriteIds.push(id); } 
                else { favoriteIds = favoriteIds.filter(fid => fid !== id); }
                localStorage.setItem('fuelWatchFavs', JSON.stringify(favoriteIds));
                if (currentModalId === id) openModal(id);
            }
        }

        // init map
        function initMap() {
            map = L.map('map').setView([-13.133, 27.849], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
            map.addLayer(clusterGroup);
        }

        // event listeners
        document.getElementById('nearMeBtn').addEventListener('click', locateAndFetch);
        document.getElementById('floatLocateBtn').addEventListener('click', () => { if (userLocation) map.setView([userLocation.lat, userLocation.lng], 15); else locateAndFetch(); });
        document.getElementById('floatAllStationsBtn').addEventListener('click', showAllStationsModal);
        document.getElementById('navAllStations').addEventListener('click', showAllStationsModal);
        document.getElementById('clearRouteBtn').addEventListener('click', () => { if (routingControl) { map.removeControl(routingControl); routingControl = null; document.getElementById('clearRouteBtn').style.display = 'none'; } });
        document.getElementById('overlayMapBtn').addEventListener('click', () => { const w = document.getElementById('mapWrapper'); if (w.requestFullscreen) w.requestFullscreen(); });
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; /* only for filter counts, markers unchanged */ updateFilterCounts(); });
        document.getElementById('clearSearchBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; searchQuery = ''; updateFilterCounts(); });
        document.getElementById('sortSelect').addEventListener('change', (e) => { sortBy = e.target.value; updateFilterCounts(); });
        document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', (e) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.dataset.filter;
            updateFilterCounts();
        }));
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('stationModal').classList.remove('show'));
        window.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show')); });
        document.getElementById('navSearch').addEventListener('click', () => { document.getElementById('searchModal').classList.add('show'); });
        document.getElementById('navFav').addEventListener('click', () => { /* fav modal quick */ 
            const favs = stations.filter(s => favoriteIds.includes(s.id));
            document.getElementById('favList').innerHTML = favs.length ? favs.map(s => `<div>${s.name}</div>`).join('') : '<p>No favs</p>';
            document.getElementById('favModal').classList.add('show');
        });
        document.getElementById('navProfile').addEventListener('click', () => document.getElementById('profileModal').classList.add('show'));
        document.getElementById('navMap').addEventListener('click', () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')));
        document.getElementById('closeSearchModal').addEventListener('click', () => document.getElementById('searchModal').classList.remove('show'));
        document.getElementById('closeFavModal').addEventListener('click', () => document.getElementById('favModal').classList.remove('show'));
        document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('show'));
        document.getElementById('closeAllStations').addEventListener('click', () => document.getElementById('allStationsModal').classList.remove('show'));
        document.getElementById('showCreateForm').addEventListener('click', () => { document.getElementById('createAccountForm').style.display = 'block'; document.getElementById('loginForm').style.display = 'none'; });
        document.getElementById('showLoginForm').addEventListener('click', () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('createAccountForm').style.display = 'none'; });

        initMap();
        locateAndFetch(); // will ask once
    })();
    </script>
</body>
</html>
