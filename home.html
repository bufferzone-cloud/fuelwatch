<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>FuelRadar · Zambia · smart routing</title>
    <!-- Leaflet, routing, marker cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- FULL FLAT, NO CURVES, 15% REDUCED SIZES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
            overflow: hidden;
            font-size: 93.5%; /* 15% reduction from 110% -> 93.5% */
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
            overflow: hidden;
        }

        /* header: logo left, big title center */
        .header {
            padding: 10px 14px 6px 14px;  /* reduced */
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-img {
            height: 34px;  /* reduced */
            width: auto;
            border-radius: 10px;
            background: white;
            padding: 3px;
            box-shadow: 0 3px 8px rgba(0,150,0,0.25);
            object-fit: contain;
        }
        .header-title {
            font-size: 26px;  /* big */
            font-weight: 900;
            color: #0a2a1f;
            letter-spacing: -0.5px;
            flex: 1;
            text-align: center;
        }
        .right-placeholder {
            width: 34px;  /* balance */
        }
        .location-details {
            font-size: 11px;
            color: #2c3e2c;
            margin-top: 4px;
            padding-left: 4px;
            display: flex;
            gap: 8px;
            font-weight: 600;
        }
        .location-details i {
            color: #16a34a;
            font-size: 10px;
        }

        /* radius slider with car icon and dotted road */
        .radius-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            background: #f0fdf4;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #bbf7d0;
        }
        .radius-row i {
            color: #16a34a;
            font-size: 20px;
        }
        .radius-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: repeating-linear-gradient(90deg, #16a34a 0px 4px, transparent 4px 8px);
            border-radius: 10px;
        }
        .radius-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2316a34a"><path d="M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z"/></svg>') no-repeat center/contain;
            cursor: pointer;
            border: none;
        }
        .radius-slider::-moz-range-thumb {
            width: 30px;
            height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2316a34a"><path d="M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z"/></svg>') no-repeat center/contain;
            cursor: pointer;
            border: none;
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 3px 10px;  /* reduced */
            border-radius: 30px;
            font-size: 11px;  /* reduced */
            font-weight: 700;
            white-space: nowrap;
        }

        .search-section {
            padding: 6px 14px 6px 14px;
            background: white;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 30px;
            padding: 5px 12px;  /* reduced */
            border: 1px solid rgba(0,150,0,0.25);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 4px;  /* reduced */
            font-size: 13px;  /* reduced */
            outline: none;
        }
        .sort-row {
            display: flex;
            gap: 6px;  /* reduced */
            margin-top: 8px;  /* reduced */
        }
        .sort-row select {
            flex: 1;
            background: white;
            border: 1px solid #bbf7d0;
            border-radius: 30px;
            padding: 7px 10px;  /* reduced */
            font-size: 11px;  /* reduced */
            font-weight: 600;
            color: #14532d;
        }
        .near-me-btn {
            background: #16a34a;
            border: none;
            border-radius: 30px;
            padding: 7px 14px;  /* reduced */
            color: white;
            font-weight: 700;
            font-size: 11px;  /* reduced */
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-section {
            padding: 6px 14px;  /* reduced */
            background: white;
        }
        .filter-scroll {
            display: flex;
            gap: 6px;  /* reduced */
            overflow-x: auto;
            padding: 2px 0;
        }
        .chip {
            background: white;
            color: #1e3a1e;
            padding: 6px 14px;  /* reduced */
            border-radius: 30px;
            font-size: 11px;  /* reduced */
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: #16a34a;
            color: white;
            border-color: #14532d;
        }
        .chip-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 2px 6px;  /* reduced */
            margin-left: 5px;
            font-size: 9px;  /* reduced */
        }

        /* map takes all remaining space between filter and bottom nav */
        .map-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            border-bottom: none;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(0,40,0,0.15);
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
            z-index: 1;
        }
        .map-top-right-buttons {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        .map-floating-buttons {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        .map-left-buttons {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        .float-btn {
            width: 42px;  /* reduced */
            height: 42px;  /* reduced */
            background: white;
            border-radius: 50px;
            box-shadow: 0 6px 12px rgba(0,80,0,0.25);
            border: none;
            color: #16a34a;
            font-size: 18px;  /* reduced */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .float-btn.clear-route {
            color: #dc2626;
            display: none;
        }
        .overlay-btn {
            background: #16a34a;
            color: white;
            font-size: 12px;  /* reduced */
            font-weight: 700;
            width: auto;
            padding: 0 12px;  /* reduced */
            border-radius: 40px;
            gap: 4px;
        }

        /* station list hidden from main view (now in modal) */
        .station-list {
            display: none;
        }

        /* bottom nav */
        .bottom-nav {
            background: #ffffff;
            border-top: 1px solid #c0e0c0;
            padding: 4px 6px 6px 6px;  /* reduced */
            display: flex;
            justify-content: space-around;
            flex-shrink: 0;
            box-shadow: 0 -3px 8px rgba(0,20,0,0.05);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4b6b4b;
            font-size: 9px;  /* reduced */
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item.active { color: #16a34a; }
        .nav-item i { font-size: 18px;  /* reduced */ margin-bottom: 2px; }

        /* modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,30,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 14px;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 36px;  /* slightly reduced */
            padding: 22px 20px;  /* reduced */
            box-shadow: 0 30px 50px rgba(0,100,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 14px; right: 16px;
            background: #f1f5f9;
            border: none;
            width: 36px; height: 36px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }
        .station-photo {
            width: 100%;
            height: 140px;  /* reduced */
            background: #e2f3e2;
            border-radius: 20px;
            object-fit: cover;
            margin: 10px 0;
        }
        .fuel-list {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 14px;
            margin: 14px 0;
        }
        .amenity-tag {
            display: inline-block;
            background: #ecfdf3;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            margin: 3px 5px 3px 0;
            border: 1px solid #86efac;
            font-weight: 600;
            color: #14532d;
        }
        .action-btn {
            border-radius: 40px;
            padding: 12px 16px;  /* reduced */
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: #f8fafc;
            font-size: 12px;  /* reduced */
        }
        .navigate-btn { background: #16a34a; color: white; }
        .action-btn#modalFav { background: #fee2e2; color: #b91c1c; }

        /* station list modal card */
        .station-list-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 6px 14px rgba(0,60,0,0.1);
            border: 1px solid #e0f0e0;
            cursor: pointer;
        }
        .station-list-name {
            font-weight: 800;
            font-size: 16px;
            color: #0c3b1e;
        }
        .station-list-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            margin: 6px 0;
            color: #2c4a2c;
        }
        .station-list-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 6px 0;
        }
        .list-amenity {
            background: rgba(22,163,74,0.1);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
        }
        .open-badge {
            background: #22c55e;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
        }
        .closed-badge {
            background: #a16207;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
        }

        /* loading overlay with pulsing logo */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .loading-logo {
            width: 140px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 20px;
            background: white;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0,150,0,0.3);
            animation: pulseMove 5s forwards;
        }
        @keyframes pulseMove {
            0% { transform: scale(1); opacity: 1; }
            20% { transform: scale(1.2); }
            40% { transform: scale(1); }
            60% { transform: scale(1.1); }
            80% { transform: scale(0.8) translate(-40vw, -40vh); opacity: 0.5; }
            100% { transform: scale(0.5) translate(-80vw, -80vh); opacity: 0; }
        }

        /* profile uploads */
        .upload-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .upload-box {
            flex: 1;
            background: #f0fdf4;
            border: 2px dashed #16a34a;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            font-size: 11px;
        }
        .upload-box input {
            width: 100%;
            margin-top: 5px;
        }

        /* spinner */
        .spinner { border: 2px solid #e2f3e2; border-top: 2px solid #16a34a; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- LOADING OVERLAY with pulsing logo -->
    <div id="loadingOverlay">
        <img src="logo.png" alt="FuelRadar" class="loading-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
    </div>

    <!-- main app container -->
    <div class="app-container">
        <div class="header">
            <div class="header-row">
                <img src="logo.png" alt="FuelRadar" class="logo-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                <div class="header-title">FuelRadar</div>
                <div class="right-placeholder"></div>
            </div>
            <div class="location-details" id="locationDetails">
                <i class="fas fa-map-pin"></i> <span id="cityName">Detecting city...</span> · <span id="areaName"></span> · <span id="roadName"></span>
            </div>
            <!-- radius slider with car icon -->
            <div class="radius-row">
                <i class="fas fa-car"></i>
                <input type="range" min="1" max="8" step="0.5" value="3" class="radius-slider" id="radiusSlider">
                <span class="radius-value" id="radiusDisplay">3 km</span>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" style="color:#16a34a;"></i>
                <input type="text" placeholder="Search station or amenity..." id="searchInput">
                <i class="fas fa-times clear-search" id="clearSearchBtn" style="cursor:pointer; color:#dc2626;"></i>
            </div>
            <div class="sort-row">
                <select id="sortSelect">
                    <option value="distance">Distance (km)</option>
                    <option value="name">Name A-Z</option>
                </select>
                <button class="near-me-btn" id="nearMeBtn"><i class="fas fa-location-arrow"></i> Near me</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-scroll" id="filterTabs">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="available">Fuel available</button>
                <button class="chip" data-filter="petrol">Petrol</button>
                <button class="chip" data-filter="diesel">Diesel</button>
            </div>
        </div>

        <!-- map fills remaining space -->
        <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
            <div class="map-top-right-buttons">
                <button class="float-btn overlay-btn" id="overlayMapBtn"><i class="fas fa-expand-alt"></i> overlay</button>
            </div>
            <div class="map-floating-buttons">
                <button class="float-btn locate" id="floatLocateBtn" title="My location"><i class="fas fa-crosshairs"></i></button>
                <!-- fuel station list button replaces refresh -->
                <button class="float-btn" id="floatStationListBtn" title="All stations"><i class="fas fa-list"></i></button>
                <button class="float-btn clear-route" id="clearRouteBtn" title="Clear route"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>

        <!-- bottom nav: Map, Search, Fuel Station (middle), Fav, Profile -->
        <div class="bottom-nav">
            <div class="nav-item active" id="navMap"><i class="fas fa-map"></i><span>Map</span></div>
            <div class="nav-item" id="navSearch"><i class="fas fa-search"></i><span>Search</span></div>
            <div class="nav-item" id="navStationList"><i class="fas fa-gas-pump"></i><span>Stations</span></div>
            <div class="nav-item" id="navFav"><i class="fas fa-heart"></i><span>Fav</span></div>
            <div class="nav-item" id="navProfile"><i class="fas fa-user"></i><span>Profile</span></div>
        </div>
    </div>

    <!-- modals -->
    <div class="modal-overlay" id="stationModal"><div class="modal-content"><button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button><div id="modalContent"></div></div></div>
    <div class="modal-overlay" id="searchModal"><div class="modal-content"><button class="modal-close" id="closeSearchModal"><i class="fas fa-times"></i></button><h2><i class="fas fa-search"></i> Search station</h2><p>City: <strong id="searchCurrentCity">-</strong></p><input type="text" id="searchFuelInput" placeholder="Name..." style="width:100%; padding:12px; border-radius:40px; border:1px solid #16a34a; margin-bottom:14px;"><div id="searchResults" style="max-height:300px; overflow-y:auto;"></div></div></div>
    <div class="modal-overlay" id="favModal"><div class="modal-content"><button class="modal-close" id="closeFavModal"><i class="fas fa-times"></i></button><h2><i class="fas fa-heart" style="color:#dc2626;"></i> Favorites</h2><div id="favList" style="margin-top:14px;"></div></div></div>

    <!-- new full‑page station list modal -->
    <div class="modal-overlay" id="stationListModal"><div class="modal-content" style="max-width:500px;"><button class="modal-close" id="closeStationListModal"><i class="fas fa-times"></i></button><h2 style="margin-bottom:12px;"><i class="fas fa-gas-pump"></i> All filling stations</h2><div id="stationListContainer" style="max-height:70vh; overflow-y:auto;"></div></div></div>

    <!-- profile modal with photo uploads -->
    <div class="modal-overlay" id="profileModal"><div class="modal-content"><button class="modal-close" id="closeProfileModal"><i class="fas fa-times"></i></button><div style="text-align:center;"><img src="logo.png" style="width:70px; border-radius:50%; background:#16a34a; padding:8px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'white\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';"><h3>FuelRadar Zambia</h3></div>
        <div style="display:flex; gap:8px; margin:16px 0;">
            <button id="showCreateForm" class="action-btn" style="flex:1; background:#16a34a; color:white;">Create</button>
            <button id="showLoginForm" class="action-btn" style="flex:1;">Log in</button>
        </div>
        <div id="createAccountForm" style="display:none;">
            <input placeholder="Full name" class="action-btn" style="width:100%; margin-bottom:8px;">
            <input placeholder="Phone" class="action-btn" style="width:100%; margin-bottom:8px;">
            <input placeholder="Email" class="action-btn" style="width:100%; margin-bottom:8px;">
            <input type="password" placeholder="Password" class="action-btn" style="width:100%; margin-bottom:8px;">
            <!-- photo uploads -->
            <div class="upload-row">
                <div class="upload-box">Profile photo <input type="file" accept="image/*"></div>
                <div class="upload-box">Car photo 1 <input type="file" accept="image/*"></div>
                <div class="upload-box">Car photo 2 <input type="file" accept="image/*"></div>
            </div>
            <button class="action-btn navigate-btn" style="width:100%;">Register (demo)</button>
        </div>
        <div id="loginForm" style="display:none;">
            <input placeholder="Email" class="action-btn" style="width:100%; margin-bottom:8px;">
            <input type="password" placeholder="Password" class="action-btn" style="width:100%; margin-bottom:8px;">
            <button class="action-btn navigate-btn" style="width:100%;">Log in (demo)</button>
        </div>
    </div></div>

    <script>
    (function() {
        // ---------- LOADING OVERLAY: pulsing logo disappears after 5s ----------
        const overlay = document.getElementById('loadingOverlay');
        setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        }, 5000); // matches animation duration

        // ---------- APP STATE ----------
        let stations = [];
        let userLocation = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let sortBy = 'distance';
        let radiusKm = 3;
        let map, clusterGroup, routingControl = null;
        let currentModalId = null;
        let userMarker = null;
        const cityCache = new Map();
        let favoriteIds = JSON.parse(localStorage.getItem('fuelWatchFavs')) || [];

        // utils
        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const updateDistances = () => {
            if (!userLocation) return;
            stations.forEach(s => { s.distance = haversine(userLocation.lat, userLocation.lng, s.lat, s.lon); });
        };

        function isOpenNow(openingHours) {
            if (!openingHours || openingHours === 'unknown') return null;
            const oh = openingHours.toLowerCase();
            if (oh.includes('24/7') || oh.includes('24 7')) return true;
            // simplified: treat as unknown
            return null;
        }

        function getPhotoUrl(tags) {
            if (tags.image) return tags.image;
            if (tags.wikimedia_commons) {
                let file = tags.wikimedia_commons.replace(/^File:/, '');
                return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}?width=300`;
            }
            if (tags.photo) return tags.photo;
            return null;
        }

        function getFuelStatus(tags) {
            const fuel = { petrol: null, diesel: null, lpg: null, cng: null };
            if (tags['fuel:petrol'] === 'yes' || tags['fuel:petrol'] === '24/7') fuel.petrol = 'yes';
            else if (tags['fuel:petrol'] === 'no') fuel.petrol = 'no';
            if (tags['fuel:diesel'] === 'yes' || tags['fuel:diesel'] === '24/7') fuel.diesel = 'yes';
            else if (tags['fuel:diesel'] === 'no') fuel.diesel = 'no';
            if (tags['fuel:lpg'] === 'yes') fuel.lpg = 'yes';
            else if (tags['fuel:lpg'] === 'no') fuel.lpg = 'no';
            if (tags['fuel:cng'] === 'yes') fuel.cng = 'yes';
            else if (tags['fuel:cng'] === 'no') fuel.cng = 'no';
            return fuel;
        }

        function overallStatus(fuel) {
            const values = [fuel.petrol, fuel.diesel, fuel.lpg, fuel.cng].filter(v => v !== null);
            if (values.includes('yes')) return 'available';
            if (values.length > 0 && values.every(v => v === 'no')) return 'empty';
            return 'unknown';
        }

        function extractAmenities(tags) {
            let amenities = [];
            const getName = (type, defaultName) => {
                if (tags[type + ':name']) return tags[type + ':name'].trim();
                if (tags.brand) return tags.brand.trim();
                if (tags.operator) return tags.operator.trim();
                if (tags.shop) return tags.shop.replace(/_/g, ' ');
                return defaultName;
            };
            if (tags.shop) {
                let shopType = tags.shop.replace(/_/g, ' ');
                let shopName = getName('shop', shopType);
                amenities.push(`🛒 Shop: ${shopName}`);
            }
            if (tags.pharmacy) {
                let pharmName = getName('pharmacy', 'Pharmacy');
                amenities.push(`💊 Pharmacy: ${pharmName}`);
            }
            if (tags.atm === 'yes' || tags.amenity === 'atm') {
                let atmName = getName('atm', 'ATM');
                amenities.push(`🏧 ${atmName}`);
            }
            if (tags.car_wash === 'yes' || tags.amenity === 'car_wash') {
                let washName = getName('car_wash', 'Car wash');
                amenities.push(`🧼 ${washName}`);
            }
            if (tags.amenity === 'restaurant' || tags.amenity === 'fast_food') {
                let type = tags.amenity === 'restaurant' ? 'Restaurant' : 'Fast food';
                let placeName = getName(tags.amenity, type);
                amenities.push(`🍽️ ${placeName}`);
            }
            if (tags.amenity === 'cafe') {
                let cafeName = getName('cafe', 'Cafe');
                amenities.push(`☕ ${cafeName}`);
            }
            if (tags.toilets === 'yes' || tags.amenity === 'toilets') {
                amenities.push(`🚻 Toilets`);
            }
            if (tags.amenity && !['fuel','restaurant','fast_food','cafe','atm','car_wash','pharmacy','toilets'].includes(tags.amenity)) {
                let otherType = tags.amenity.replace(/_/g, ' ');
                let otherName = getName(tags.amenity, otherType);
                amenities.push(`📌 ${otherName}`);
            }
            return [...new Set(amenities)];
        }

        async function fetchStations(lat, lon, radius) {
            const query = `[out:json];(node["amenity"="fuel"](around:${radius*1000},${lat},${lon});way["amenity"="fuel"](around:${radius*1000},${lat},${lon}););out body;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const elements = data.elements;
                const stationMap = new Map();
                elements.forEach(el => {
                    let name = el.tags?.name || el.tags?.brand || "Fuel station";
                    let lat = el.lat || (el.center && el.center.lat);
                    let lon = el.lon || (el.center && el.center.lon);
                    if (!lat || !lon) return;
                    const id = el.id;
                    if (!stationMap.has(id)) {
                        let addr = [];
                        if (el.tags?.['addr:housenumber']) addr.push(el.tags['addr:housenumber']);
                        if (el.tags?.['addr:street']) addr.push(el.tags['addr:street']);
                        if (el.tags?.['addr:city']) addr.push(el.tags['addr:city']);
                        let address = addr.join(', ') || 'local road';
                        let openingHours = el.tags?.opening_hours || (el.tags?.['24/7'] ? '24/7' : 'unknown');

                        stationMap.set(id, {
                            id: id,
                            name: name,
                            address: address,
                            lat, lon,
                            tags: el.tags || {},
                            openingHours: openingHours,
                            fuel: getFuelStatus(el.tags || {}),
                            amenities: extractAmenities(el.tags || {}),
                            photoUrl: getPhotoUrl(el.tags || {}),
                            lastUpdated: new Date().toLocaleTimeString() + ' (OSM)',
                            favorite: favoriteIds.includes(id)
                        });
                    }
                });
                let newStations = Array.from(stationMap.values());
                newStations = newStations.map(s => {
                    s.status = overallStatus(s.fuel);
                    if (s.amenities.length === 0) s.amenities.push('⛽ Fuel station');
                    return s;
                });
                return newStations;
            } catch (e) {
                console.warn("Overpass error", e);
                return [];
            }
        }

        function getIconForStatus(status) {
            let color = (status === 'available') ? '#16a34a' : (status === 'empty' ? '#dc2626' : '#3b82f6');
            return L.divIcon({
                html: `<i class="fas fa-gas-pump" style="color: ${color}; font-size: 22px; filter: drop-shadow(0 2px 6px #00000040);"></i>`,
                iconSize: [26, 26],
                className: 'fuel-marker'
            });
        }

        async function loadStations(showSpinner = true) {
            if (!userLocation) return;
            if (showSpinner) document.getElementById('nearMeBtn').innerHTML = '<span class="spinner"></span> loading';
            stations = await fetchStations(userLocation.lat, userLocation.lng, radiusKm);
            updateDistances();
            renderCardsAndMarkers();
            if (showSpinner) document.getElementById('nearMeBtn').innerHTML = '<i class="fas fa-location-arrow"></i> Near me';
        }

        function getFilteredStations() {
            let filtered = stations.slice();
            if (currentFilter !== 'all') {
                if (currentFilter === 'available') {
                    filtered = filtered.filter(s => s.status === 'available');
                } else {
                    filtered = filtered.filter(s => s.fuel[currentFilter] === 'yes');
                }
            }
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(s => s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q) || s.amenities.some(a => a.toLowerCase().includes(q)));
            }
            filtered.sort((a,b) => {
                if (sortBy === 'distance') return (a.distance || 999) - (b.distance || 999);
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                return 0;
            });
            return filtered;
        }

        function updateFilterCounts() {
            const total = stations.length;
            const available = stations.filter(s => s.status === 'available').length;
            const petrol = stations.filter(s => s.fuel.petrol === 'yes').length;
            const diesel = stations.filter(s => s.fuel.diesel === 'yes').length;
            const chips = document.querySelectorAll('.chip');
            chips[0].innerHTML = `All <span class="chip-count">${total}</span>`;
            chips[1].innerHTML = `Fuel available <span class="chip-count">${available}</span>`;
            chips[2].innerHTML = `Petrol <span class="chip-count">${petrol}</span>`;
            chips[3].innerHTML = `Diesel <span class="chip-count">${diesel}</span>`;
        }

        // No station list in main view, just markers
        function renderCardsAndMarkers() {
            const filtered = getFilteredStations();
            if (map && clusterGroup) {
                clusterGroup.clearLayers();
                filtered.forEach(s => {
                    const marker = L.marker([s.lat, s.lon], { icon: getIconForStatus(s.status) })
                        .bindPopup(`<b>${s.name}</b><br>${s.status==='available'?'✅ fuel':'⛔ status: '+s.status}`);
                    marker.on('click', () => openModal(s.id));
                    clusterGroup.addLayer(marker);
                });
            }
            document.getElementById('stationCount').innerText = filtered.length; // hidden but kept
            updateFilterCounts();
        }

        // open detail modal
        function openModal(id) {
            const s = stations.find(s => s.id === id);
            if (!s) return;
            currentModalId = id;
            const fuelRows = ['petrol','diesel','lpg','cng'].map(f => {
                let statusIcon = '';
                if (s.fuel[f] === 'yes') statusIcon = '✅';
                else if (s.fuel[f] === 'no') statusIcon = '❌';
                else statusIcon = '❓';
                return `<div style="display:flex; justify-content:space-between; margin:4px 0;"><span><i class="fas fa-gas-pump"></i> ${f.toUpperCase()}</span> <strong>${statusIcon} ${s.fuel[f] === 'yes' ? 'K (real price N/A)' : (s.fuel[f] === 'no' ? 'unavailable' : 'unknown')}</strong> <button class="report-btn" data-fuel="${f}" data-id="${s.id}">report</button></div>`;
            }).join('');
            const amenitiesHtml = s.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join(' ');
            const photoHtml = s.photoUrl ? `<img src="${s.photoUrl}" class="station-photo" alt="station photo" onerror="this.style.display='none'">` : `<div class="station-photo" style="display:flex; align-items:center; justify-content:center; background:#cbd5e1;"><i class="fas fa-gas-pump" style="font-size:36px; color:#fff;"></i></div>`;
            const travelTime = s.distance ? Math.round(s.distance / 50 * 60) : null;
            const timeHtml = travelTime ? `<span><i class="fas fa-clock"></i> ~${travelTime} min drive</span>` : '';
            const openNow = isOpenNow(s.openingHours);
            const openBadge = openNow === true ? '<span class="open-now-badge" style="background:#22c55e; padding:2px 8px; border-radius:20px;">OPEN</span>' : (openNow === false ? '<span class="open-now-badge" style="background:#a16207; padding:2px 8px; border-radius:20px;">CLOSED</span>' : '');
            const modalHtml = `
                <h2 style="font-size:20px; margin-bottom:2px;">${s.name} ${openBadge}</h2>
                <p style="color:#2c4a2c; font-size:12px;"><i class="fas fa-map-pin"></i> ${s.address} (${s.distance?.toFixed(1)} km) ${timeHtml}</p>
                ${photoHtml}
                <div style="display:flex; gap:12px; margin:8px 0; background:#ecfdf5; padding:6px 14px; border-radius:40px; font-size:11px;">
                    <span><i class="far fa-clock"></i> ${s.openingHours}</span>
                </div>
                <div class="fuel-list">
                    <h4 style="margin-bottom:6px;">⛽ Fuel availability</h4>
                    ${fuelRows}
                </div>
                <div style="margin: 12px 0;">
                    <h4 style="font-size:12px;"><i class="fas fa-store-alt"></i> Amenities</h4>
                    <div style="margin-top:6px;">${amenitiesHtml || '— none reported —'}</div>
                </div>
                <p style="font-size:8px; color:#6b7e6b;">last sync: ${s.lastUpdated} · currency: Zambian Kwacha (K)</p>
                <div style="display:flex; gap:6px; margin-top:14px;">
                    <button class="action-btn navigate-btn" id="modalNav"><i class="fas fa-route"></i> Navigate</button>
                    <button class="action-btn" id="modalFav"><i class="${s.favorite ? 'fas' : 'far'} fa-heart"></i> Fav</button>
                    <button class="action-btn" id="modalShare"><i class="fas fa-share-alt"></i> Share</button>
                </div>
            `;
            document.getElementById('modalContent').innerHTML = modalHtml;
            document.getElementById('modalNav').addEventListener('click', () => startNavigation(s.lat, s.lon, s.name));
            document.getElementById('modalFav').addEventListener('click', () => toggleFavorite(s.id));
            document.getElementById('modalShare').addEventListener('click', () => { navigator.share?.( {title:s.name, text:`Check ${s.name} on FuelRadar`} ).catch(()=>alert('Share demo')); });
            document.querySelectorAll('.report-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); alert(`Report price for ${btn.dataset.fuel} (demo)`); });
            });
            document.getElementById('stationModal').classList.add('show');
        }

        function toggleFavorite(id) {
            const s = stations.find(s => s.id === id);
            if (s) { 
                s.favorite = !s.favorite; 
                if (s.favorite) { if (!favoriteIds.includes(id)) favoriteIds.push(id); } 
                else { favoriteIds = favoriteIds.filter(fid => fid !== id); }
                localStorage.setItem('fuelWatchFavs', JSON.stringify(favoriteIds));
                renderCardsAndMarkers(); 
                if (currentModalId === id) openModal(id); 
            }
        }

        function startNavigation(destLat, destLon, destName) {
            document.getElementById('stationModal').classList.remove('show');
            document.getElementById('stationListModal').classList.remove('show');
            if (!userLocation) { alert('Location not available'); return; }
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLocation.lat, userLocation.lng), L.latLng(destLat, destLon)],
                routeWhileDragging: false,
                fitSelectedRoutes: true,
                lineOptions: { styles: [{ color: '#16a34a', weight: 5 }] }
            }).addTo(map);
            document.getElementById('clearRouteBtn').style.display = 'flex';
        }

        async function updateCityDetails(lat, lon) {
            const key = `${lat.toFixed(2)},${lon.toFixed(2)}`;
            if (cityCache.has(key)) {
                document.getElementById('cityName').innerText = cityCache.get(key).city || 'City';
                document.getElementById('areaName').innerText = cityCache.get(key).area || '';
                document.getElementById('roadName').innerText = cityCache.get(key).road || '';
                return;
            }
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const data = await res.json();
                const addr = data.address || {};
                const city = addr.city || addr.town || addr.village || addr.county || 'Zambia';
                const area = addr.suburb || addr.neighbourhood || '';
                const road = addr.road || '';
                cityCache.set(key, { city, area, road });
                document.getElementById('cityName').innerText = city;
                document.getElementById('areaName').innerText = area;
                document.getElementById('roadName').innerText = road;
            } catch { 
                document.getElementById('cityName').innerText = 'Lusaka'; 
                document.getElementById('areaName').innerText = '';
                document.getElementById('roadName').innerText = '';
            }
        }

        async function searchCity(query) {
            if (!query) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}, Zambia&limit=1`);
                const data = await res.json();
                if (data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    map.setView([lat, lon], 12);
                } else alert('City not found');
            } catch (e) { alert('Geocoding error'); }
        }

        function initMap() {
            map = L.map('map').setView([-13.133, 27.849], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
            map.addLayer(clusterGroup);
        }

        function locateAndFetch() {
            if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
            document.getElementById('userLocationStatus').innerText = 'locating...';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
                    radius: 7, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 0.9, weight: 2
                }).addTo(map).bindPopup('You are here').openPopup();
                map.setView([userLocation.lat, userLocation.lng], 13);
                document.getElementById('userLocationStatus').innerHTML = `${userLocation.lat.toFixed(3)}, ${userLocation.lng.toFixed(3)}`;
                updateCityDetails(userLocation.lat, userLocation.lng);
                await loadStations(true);
            }, (err) => {
                alert('Location error: ' + err.message);
                document.getElementById('nearMeBtn').innerHTML = '<i class="fas fa-location-arrow"></i> Near me';
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }); // always fresh
        }

        // show full station list modal
        function showStationListModal() {
            const filtered = getFilteredStations();
            const container = document.getElementById('stationListContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;">No stations found</p>';
            } else {
                container.innerHTML = filtered.map(s => {
                    const eta = s.distance ? Math.round(s.distance / 50 * 60) : null;
                    const openNow = isOpenNow(s.openingHours);
                    const openClass = openNow === true ? 'open-badge' : (openNow === false ? 'closed-badge' : '');
                    const openText = openNow === true ? 'OPEN' : (openNow === false ? 'CLOSED' : '⏳');
                    return `
                        <div class="station-list-card" data-id="${s.id}">
                            <div style="display:flex; justify-content:space-between;">
                                <span class="station-list-name">${s.name}</span>
                                <span class="${openClass}">${openText}</span>
                            </div>
                            <div class="station-list-details">
                                <span><i class="fas fa-route"></i> ${s.distance?.toFixed(1)} km</span>
                                ${eta ? `<span><i class="fas fa-clock"></i> ~${eta} min</span>` : ''}
                            </div>
                            <div class="station-list-amenities">
                                ${s.amenities.slice(0,3).map(a => `<span class="list-amenity">${a.substring(0,15)}</span>`).join('')}
                            </div>
                            <button class="action-btn navigate-btn" style="width:100%; margin-top:6px;" data-navigate-id="${s.id}"><i class="fas fa-route"></i> Navigate</button>
                        </div>
                    `;
                }).join('');
                // attach navigate buttons
                container.querySelectorAll('[data-navigate-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.navigateId);
                        const station = stations.find(s => s.id === id);
                        if (station) startNavigation(station.lat, station.lon, station.name);
                    });
                });
                // card click opens detail modal
                container.querySelectorAll('.station-list-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('button')) return;
                        const id = parseInt(card.dataset.id);
                        openModal(id);
                    });
                });
            }
            document.getElementById('stationListModal').classList.add('show');
        }

        // search modal
        function showSearchModal() {
            document.getElementById('searchCurrentCity').innerText = document.getElementById('cityName').innerText;
            document.getElementById('searchModal').classList.add('show');
            document.getElementById('searchFuelInput').focus();
            updateSearchResults('');
        }
        function updateSearchResults(query) {
            const resultsDiv = document.getElementById('searchResults');
            if (!stations.length) { resultsDiv.innerHTML = '<p>No stations loaded</p>'; return; }
            let filtered = stations.filter(s => s.name.toLowerCase().includes(query.toLowerCase()) || s.address.toLowerCase().includes(query.toLowerCase()));
            filtered.sort((a,b) => (a.distance||999)-(b.distance||999));
            if (filtered.length===0) resultsDiv.innerHTML = '<p>No matches</p>';
            else {
                resultsDiv.innerHTML = filtered.slice(0,10).map(s => `
                    <div class="station-card" style="padding:8px; cursor:pointer; border-radius:16px; margin-bottom:6px;" data-id="${s.id}">
                        <strong>${s.name}</strong> <span style="float:right;">${s.distance?.toFixed(1)} km</span>
                        <div style="font-size:11px;">${s.address}</div>
                    </div>
                `).join('');
                resultsDiv.querySelectorAll('.station-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const id = parseInt(card.dataset.id);
                        document.getElementById('searchModal').classList.remove('show');
                        openModal(id);
                    });
                });
            }
        }

        function showFavModal() {
            const favStations = stations.filter(s => favoriteIds.includes(s.id));
            const container = document.getElementById('favList');
            if (favStations.length===0) container.innerHTML = '<p>No favorites yet</p>';
            else {
                container.innerHTML = favStations.map(s => `
                    <div class="station-card" style="padding:10px; margin-bottom:8px;" data-id="${s.id}">
                        <div style="display:flex; justify-content:space-between;"><strong>${s.name}</strong> <span>${s.distance?.toFixed(1)} km</span></div>
                        <button class="favorite-icon" data-id="${s.id}"><i class="fas fa-heart" style="color:#dc2626;"></i> remove</button>
                    </div>
                `).join('');
                container.querySelectorAll('.favorite-icon').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(parseInt(btn.dataset.id)); showFavModal(); });
                });
                container.querySelectorAll('.station-card').forEach(card => {
                    card.addEventListener('click', (e) => { if(!e.target.closest('button')) openModal(parseInt(card.dataset.id)); });
                });
            }
            document.getElementById('favModal').classList.add('show');
        }

        function showProfileModal() {
            document.getElementById('profileModal').classList.add('show');
        }

        // overlay map fullscreen
        document.getElementById('overlayMapBtn').addEventListener('click', () => {
            const mapWrapper = document.getElementById('mapWrapper');
            if (mapWrapper.requestFullscreen) mapWrapper.requestFullscreen();
            else if (mapWrapper.webkitRequestFullscreen) mapWrapper.webkitRequestFullscreen();
        });

        // event listeners
        document.getElementById('nearMeBtn').addEventListener('click', locateAndFetch);
        document.getElementById('floatLocateBtn').addEventListener('click', () => { if (userLocation) map.setView([userLocation.lat, userLocation.lng], 15); else locateAndFetch(); });
        document.getElementById('floatStationListBtn').addEventListener('click', showStationListModal);
        document.getElementById('navStationList').addEventListener('click', showStationListModal);
        document.getElementById('navRefresh')?.remove(); // not used
        document.getElementById('radiusSlider').addEventListener('input', (e) => {
            radiusKm = parseFloat(e.target.value);
            document.getElementById('radiusDisplay').innerText = radiusKm + ' km';
            if (userLocation) loadStations(false);
        });
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; renderCardsAndMarkers(); });
        document.getElementById('clearSearchBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; searchQuery = ''; renderCardsAndMarkers(); });
        document.getElementById('sortSelect').addEventListener('change', (e) => { sortBy = e.target.value; renderCardsAndMarkers(); });
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.filter;
                renderCardsAndMarkers();
            });
        });
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('stationModal').classList.remove('show'));
        window.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show')); });
        document.getElementById('clearRouteBtn').addEventListener('click', () => {
            if (routingControl) { map.removeControl(routingControl); routingControl = null; document.getElementById('clearRouteBtn').style.display = 'none'; }
        });

        document.getElementById('navSearch').addEventListener('click', showSearchModal);
        document.getElementById('navFav').addEventListener('click', showFavModal);
        document.getElementById('navProfile').addEventListener('click', showProfileModal);
        document.getElementById('navMap').addEventListener('click', () => { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); });

        document.getElementById('searchFuelInput').addEventListener('input', (e) => updateSearchResults(e.target.value));
        document.getElementById('closeSearchModal').addEventListener('click', () => document.getElementById('searchModal').classList.remove('show'));
        document.getElementById('closeFavModal').addEventListener('click', () => document.getElementById('favModal').classList.remove('show'));
        document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('show'));
        document.getElementById('closeStationListModal').addEventListener('click', () => document.getElementById('stationListModal').classList.remove('show'));

        document.getElementById('showCreateForm').addEventListener('click', () => { document.getElementById('createAccountForm').style.display = 'block'; document.getElementById('loginForm').style.display = 'none'; });
        document.getElementById('showLoginForm').addEventListener('click', () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('createAccountForm').style.display = 'none'; });

        initMap();
        locateAndFetch(); // will ask once
    })();
    </script>
</body>
</html>
