<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>FuelRadar · Zambia · live stations</title>
    <!-- Leaflet, routing, marker cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
            overflow: hidden;
            font-size: 110%;
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            box-shadow: none;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
            overflow: hidden;
            position: relative;
        }

        /* header */
        .header {
            padding: 12px 16px 8px 16px;
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 40px;
            width: auto;
            border-radius: 12px;
            background: white;
            padding: 4px;
            box-shadow: 0 4px 10px rgba(0,150,0,0.25);
            object-fit: contain;
        }
        .header-text {
            flex: 1;
        }
        .header-text h1 {
            font-size: 20px;
            font-weight: 800;
            color: #0a2a1f;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .city-badge {
            background: #dcfce7;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 700;
            color: #166534;
            border: 1px solid #86efac;
            white-space: nowrap;
        }
        .header-text p {
            font-size: 12px;
            color: #2c3e2c;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .road-badge {
            background: #eef2ff;
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .menu-btn {
            background: #f0fdf4;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            font-size: 20px;
            color: #16a34a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .city-search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            background: #f0fdf4;
            border-radius: 40px;
            padding: 4px 4px 4px 14px;
            border: 1px solid #bbf7d0;
        }
        .city-search-row i {
            color: #16a34a;
            font-size: 15px;
        }
        .city-search-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
        }
        .city-search-row button {
            background: #16a34a;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .radius-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .radius-icon {
            font-size: 20px;
            color: #16a34a;
            background: #eef2ff;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }
        .radius-slider {
            flex: 1;
            height: 6px;
            background: rgba(0,150,0,0.2);
            border-radius: 10px;
            accent-color: #16a34a;
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
        }

        .search-section {
            padding: 8px 16px 8px 16px;
            background: white;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 30px;
            padding: 6px 14px;
            border: 1px solid rgba(0,150,0,0.25);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 4px;
            font-size: 15px;
            outline: none;
        }
        .near-me-row {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .near-me-btn {
            background: #16a34a;
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,80,0,0.2);
        }

        .filter-section {
            padding: 8px 16px;
            background: white;
        }
        .filter-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0;
        }
        .chip {
            background: white;
            color: #1e3a1e;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: #16a34a;
            color: white;
            border-color: #14532d;
        }
        .chip-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 3px 8px;
            margin-left: 6px;
            font-size: 11px;
        }

        /* map wrapper: full remaining space */
        .map-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            border-radius: 0;
            overflow: hidden;
            background: #cbd5e1;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
            z-index: 1;
        }
        .map-floating-buttons {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .map-top-right {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 10;
        }
        .float-btn {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 8px 16px rgba(0,80,0,0.3);
            border: none;
            color: #16a34a;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .float-btn.clear-route {
            color: #dc2626;
            display: none;
        }
        .overlay-top {
            background: #16a34a;
            color: white;
        }

        /* floating fuel stations pill */
        .floating-fuel-pill {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0,100,0,0.4);
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(2px);
            transition: 0.2s;
        }
        .floating-fuel-pill i {
            font-size: 24px;
        }

        /* station card (reused in modal) */
        .station-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 12px 20px -8px rgba(0,60,0,0.2);
            border: 1px solid #e0f0e0;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .station-name {
            font-weight: 800;
            font-size: 18px;
            color: #0c3b1e;
        }
        .open-now-badge {
            background: #22c55e;
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 8px;
        }
        .address {
            font-size: 12px;
            color: #2c4a2c;
            margin: 5px 0 8px 0;
            display: flex;
            gap: 5px;
        }
        .distance-rating {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .fuel-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 5px 0;
        }
        .fuel-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .fuel-badge.available { background: #16a34a; color: white; }
        .fuel-badge.unavailable { background: #dc2626; color: white; }
        .fuel-badge.unknown { background: #3b82f6; color: white; }
        .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .service-tag {
            background: rgba(22,163,74,0.15);
            color: #14532d;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #86efac;
        }

        /* modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,30,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 40px;
            padding: 28px 24px;
            box-shadow: 0 40px 60px rgba(0,100,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }
        .station-photo {
            width: 100%;
            height: 160px;
            background: #e2f3e2;
            border-radius: 24px;
            object-fit: cover;
            margin: 12px 0;
        }
        .fuel-list {
            background: #f0fdf4;
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0;
        }
        .amenity-tag {
            display: inline-block;
            background: #ecfdf3;
            padding: 7px 16px;
            border-radius: 40px;
            font-size: 13px;
            margin: 4px 6px 4px 0;
            border: 1px solid #86efac;
            font-weight: 600;
        }
        .action-btn {
            border-radius: 40px;
            padding: 14px 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: #f8fafc;
            font-size: 14px;
        }
        .navigate-btn { background: #16a34a; color: white; }
        .report-btn { background: #3b82f6; color: white; border: none; border-radius: 20px; padding: 4px 12px; font-size: 11px; margin-left: 6px; cursor: pointer; }

        /* SIDEBAR */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 3000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .sidebar-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.2);
            z-index: 3001;
            transition: right 0.25s ease-out;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .sidebar-overlay.open .sidebar-panel {
            right: 0;
        }
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0f0e0;
            font-size: 20px;
            font-weight: 800;
            color: #16a34a;
            display: flex;
            justify-content: space-between;
        }
        .sidebar-menu {
            flex: 1;
            padding: 20px 0;
        }
        .sidebar-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #1e3a1e;
            cursor: pointer;
            transition: 0.1s;
        }
        .sidebar-item i {
            width: 28px;
            font-size: 20px;
            color: #16a34a;
        }
        .sidebar-item:hover {
            background: #f0fdf4;
        }

        /* misc */
        .spinner { border: 3px solid #e2f3e2; border-top: 3px solid #16a34a; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .progress-container {
            width: 70%;
            height: 24px;
            background: #e6f0e6;
            border-radius: 60px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #16a34a;
            transition: width 0.05s linear;
        }
    </style>
</head>
<body>
    <!-- loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <img src="fuel.jpeg" alt="FuelRadar" style="width:140px; margin-bottom:20px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
        <div class="progress-container"><div class="progress-bar" id="loadingBar"></div></div>
        <div id="loadingPercent" style="font-weight:800;">0%</div>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <img src="fuel.jpeg" class="logo-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                <div class="header-text">
                    <h1>FuelRadar · <span class="city-badge" id="cityDisplay"><i class="fas fa-map-pin"></i> locating..</span></h1>
                    <p><span id="stationCountHeader">0 stations</span> <span id="roadLocation" class="road-badge"><i class="fas fa-road"></i> road: —</span></p>
                </div>
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            </div>
            <div class="city-search-row">
                <i class="fas fa-search"></i>
                <input type="text" id="citySearchInput" placeholder="Search city (e.g. Lusaka)">
                <button id="citySearchBtn">Go</button>
            </div>
            <div class="radius-row">
                <i class="fas fa-car radius-icon"></i>
                <input type="range" min="1" max="8" step="0.5" value="3" class="radius-slider" id="radiusSlider">
                <i class="fas fa-car radius-icon"></i>
                <span class="radius-value" id="radiusDisplay">3 km</span>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" style="color:#16a34a;"></i>
                <input type="text" placeholder="Search station or amenity..." id="searchInput">
                <i class="fas fa-times clear-search" id="clearSearchBtn" style="cursor:pointer; color:#dc2626;"></i>
            </div>
            <div class="near-me-row">
                <button class="near-me-btn" id="nearMeBtn"><i class="fas fa-location-arrow"></i> Near me</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-scroll" id="filterTabs">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="available">Fuel available</button>
                <button class="chip" data-filter="petrol">Petrol</button>
                <button class="chip" data-filter="diesel">Diesel</button>
            </div>
        </div>

        <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
            <div class="map-top-right">
                <button class="float-btn overlay-top" id="overlayMapBtn"><i class="fas fa-expand-alt"></i></button>
            </div>
            <div class="map-floating-buttons">
                <button class="float-btn locate" id="floatLocateBtn" title="My location"><i class="fas fa-crosshairs"></i></button>
                <button class="float-btn refresh" id="floatRefreshBtn" title="Refresh stations"><i class="fas fa-sync-alt"></i></button>
                <button class="float-btn clear-route" id="clearRouteBtn" title="Clear route"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>
    </div>

    <!-- floating pill for stations list -->
    <button class="floating-fuel-pill" id="floatingFuelBtn"><i class="fas fa-gas-pump"></i> Fuel stations <i class="fas fa-chevron-up"></i></button>

    <!-- modals: station detail, search, fav, profile, fuel list modal -->
    <div class="modal-overlay" id="stationModal"><div class="modal-content"><button class="modal-close" id="closeModalBtn" style="float:right; background:none; border:none; font-size:24px;">&times;</button><div id="modalContent"></div></div></div>
    <div class="modal-overlay" id="searchModal"><div class="modal-content"><button class="modal-close" id="closeSearchModal" style="float:right;">&times;</button><h3><i class="fas fa-search"></i> Search station</h3><input type="text" id="searchFuelInput" placeholder="Name..." style="width:100%; padding:12px; border-radius:40px; border:1px solid #16a34a;"><div id="searchResultsModal" style="max-height:300px; overflow-y:auto; margin-top:16px;"></div></div></div>
    <div class="modal-overlay" id="favModal"><div class="modal-content"><button class="modal-close" id="closeFavModal" style="float:right;">&times;</button><h3><i class="fas fa-heart" style="color:#dc2626;"></i> Favorites</h3><div id="favListModal"></div></div></div>
    <div class="modal-overlay" id="profileModal"><div class="modal-content"><button class="modal-close" id="closeProfileModal" style="float:right;">&times;</button><div style="text-align:center;"><img src="fuel.jpeg" style="width:70px; border-radius:50%;"><h3>FuelRadar Zambia</h3><p>Demo profile</p><button id="showCreateForm" class="action-btn">Create account</button><button id="showLoginForm" class="action-btn">Log in</button><div id="createAccountForm" style="display:none; margin-top:12px;"><input placeholder="Name" style="width:100%; margin:5px 0;"><input placeholder="Email"><button class="action-btn navigate-btn" style="width:100%; margin-top:8px;">Register (demo)</button></div><div id="loginForm" style="display:none;"><input placeholder="Email"><input placeholder="Password"><button class="action-btn navigate-btn">Login demo</button></div></div></div></div>
    <div class="modal-overlay" id="fuelStationsModal"><div class="modal-content"><button class="modal-close" id="closeFuelStationsBtn" style="float:right;">&times;</button><h3><i class="fas fa-gas-pump"></i> All stations (nearest first)</h3><div id="fuelStationsList" style="max-height: 60vh; overflow-y: auto; margin-top: 16px;"></div></div></div>

    <!-- sidebar -->
    <div id="sidebarOverlay" class="sidebar-overlay">
        <div class="sidebar-panel">
            <div class="sidebar-header"><span>⚡ FuelRadar</span><button id="closeSidebarBtn" style="background:none; border:none; font-size:24px;">&times;</button></div>
            <div class="sidebar-menu">
                <div class="sidebar-item" data-action="search"><i class="fas fa-search"></i> Search</div>
                <div class="sidebar-item" data-action="refresh"><i class="fas fa-sync-alt"></i> Refresh</div>
                <div class="sidebar-item" data-action="fav"><i class="fas fa-heart"></i> Favorites</div>
                <div class="sidebar-item" data-action="profile"><i class="fas fa-user"></i> Profile</div>
                <div class="sidebar-item" data-action="settings"><i class="fas fa-cog"></i> Settings</div>
                <div class="sidebar-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // loading animation
        let prog = 0;
        const interval = setInterval(() => {
            prog += 2;
            if (prog >= 100) { clearInterval(interval); document.getElementById('loadingOverlay').style.display = 'none'; }
            document.getElementById('loadingBar').style.width = prog + '%';
            document.getElementById('loadingPercent').innerText = prog + '%';
        }, 50);
        
        let stations = [];
        let userLocation = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let radiusKm = 3;
        let map, clusterGroup, routingControl = null;
        let userMarker = null;
        let favoriteIds = JSON.parse(localStorage.getItem('fuelWatchFavs')) || [];
        let currentRoad = '—';

        const haversine = (lat1,lng1,lat2,lng2) => { const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLng=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); };
        const updateDistances = () => { if(userLocation) stations.forEach(s => s.distance = haversine(userLocation.lat, userLocation.lng, s.lat, s.lon)); };
        
        function getFuelStatus(tags) { return { petrol: tags['fuel:petrol']==='yes'?'yes':(tags['fuel:petrol']==='no'?'no':null), diesel: tags['fuel:diesel']==='yes'?'yes':(tags['fuel:diesel']==='no'?'no':null), lpg: tags['fuel:lpg']==='yes'?'yes':(tags['fuel:lpg']==='no'?'no':null), cng: tags['fuel:cng']==='yes'?'yes':(tags['fuel:cng']==='no'?'no':null) }; }
        function overallStatus(fuel) { const vals=[fuel.petrol,fuel.diesel,fuel.lpg,fuel.cng].filter(v=>v!==null); if(vals.includes('yes')) return 'available'; if(vals.length && vals.every(v=>v==='no')) return 'empty'; return 'unknown'; }
        function extractAmenities(tags){ let a=[]; if(tags.shop) a.push(`🛒 Shop: ${tags.shop}`); if(tags.pharmacy) a.push(`💊 Pharmacy`); if(tags.atm==='yes') a.push(`🏧 ATM`); if(tags.car_wash==='yes') a.push(`🧼 Car wash`); if(tags.amenity==='restaurant') a.push(`🍽️ Restaurant`); if(tags.toilets==='yes') a.push(`🚻 Toilets`); if(a.length===0) a.push('⛽ Fuel station'); return [...new Set(a)]; }
        async function fetchStations(lat,lon,rad){ const q=`[out:json];(node["amenity"="fuel"](around:${rad*1000},${lat},${lon});way["amenity"="fuel"](around:${rad*1000},${lat},${lon}););out body;`; const url=`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`; try{ const res=await fetch(url); const data=await res.json(); const mapSt=new Map(); data.elements.forEach(el=>{ let name=el.tags?.name||el.tags?.brand||"Fuel station"; let lat=el.lat||(el.center?.lat); let lon=el.lon||(el.center?.lon); if(!lat||!lon) return; const id=el.id; if(!mapSt.has(id)){ let addr=[el.tags?.['addr:housenumber'],el.tags?.['addr:street']].filter(Boolean).join(', ')||'local road'; mapSt.set(id,{ id, name, address:addr, lat, lon, tags:el.tags||{}, openingHours:el.tags?.opening_hours||'unknown', fuel:getFuelStatus(el.tags||{}), amenities:extractAmenities(el.tags||{}), photoUrl:null, lastUpdated:new Date().toLocaleTimeString(), favorite:favoriteIds.includes(id) }); } }); let st=Array.from(mapSt.values()); st.forEach(s=>{ s.status=overallStatus(s.fuel); }); return st; } catch(e){ return []; } }
        
        function getFilteredStations(){ let filtered=stations.slice(); if(currentFilter!=='all'){ if(currentFilter==='available') filtered=filtered.filter(s=>s.status==='available'); else filtered=filtered.filter(s=>s.fuel[currentFilter]==='yes'); } if(searchQuery.trim()){ const q=searchQuery.toLowerCase(); filtered=filtered.filter(s=>s.name.toLowerCase().includes(q)||s.address.toLowerCase().includes(q)||s.amenities.some(a=>a.toLowerCase().includes(q))); } filtered.sort((a,b)=>(a.distance||999)-(b.distance||999)); return filtered; }
        
        function updateUIcounters(){ const filtered=getFilteredStations(); document.getElementById('stationCountHeader').innerHTML = `${filtered.length} stations`; const chips=document.querySelectorAll('.chip'); if(stations.length){ chips[0].innerHTML=`All <span class="chip-count">${stations.length}</span>`; chips[1].innerHTML=`Fuel available <span class="chip-count">${stations.filter(s=>s.status==='available').length}</span>`; chips[2].innerHTML=`Petrol <span class="chip-count">${stations.filter(s=>s.fuel.petrol==='yes').length}</span>`; chips[3].innerHTML=`Diesel <span class="chip-count">${stations.filter(s=>s.fuel.diesel==='yes').length}</span>`; } }
        
        function renderMarkers(){ if(!map||!clusterGroup) return; clusterGroup.clearLayers(); getFilteredStations().forEach(s=>{ const color=s.status==='available'?'#16a34a':(s.status==='empty'?'#dc2626':'#3b82f6'); const icon=L.divIcon({ html:`<i class="fas fa-gas-pump" style="color:${color}; font-size:28px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));"></i>`, iconSize:[28,28], className:'fuel-marker' }); const marker=L.marker([s.lat,s.lon],{icon}).bindPopup(`<b>${s.name}</b><br>${s.status==='available'?'✅ fuel in stock':'⚠️ status: '+s.status}`); marker.on('click',()=>openStationModal(s.id)); clusterGroup.addLayer(marker); }); }
        
        async function loadStations(showToast=true){ if(!userLocation) return; if(showToast) document.getElementById('nearMeBtn').innerHTML='<span class="spinner"></span> loading'; stations=await fetchStations(userLocation.lat,userLocation.lng,radiusKm); updateDistances(); renderMarkers(); updateUIcounters(); if(showToast) document.getElementById('nearMeBtn').innerHTML='<i class="fas fa-location-arrow"></i> Near me'; }
        
        function toggleFavorite(id){ const s=stations.find(s=>s.id===id); if(s){ s.favorite=!s.favorite; if(s.favorite){ if(!favoriteIds.includes(id)) favoriteIds.push(id); } else favoriteIds=favoriteIds.filter(fid=>fid!==id); localStorage.setItem('fuelWatchFavs',JSON.stringify(favoriteIds)); renderMarkers(); updateUIcounters(); if(document.getElementById('stationModal').classList.contains('show')) openStationModal(id); } }
        
        function openStationModal(id){ const s=stations.find(s=>s.id===id); if(!s) return; const fuelRows=['petrol','diesel','lpg','cng'].map(f=>{ let icon=s.fuel[f]==='yes'?'✅':(s.fuel[f]==='no'?'❌':'❓'); return `<div><span>${f.toUpperCase()}</span> <strong>${icon} ${s.fuel[f]==='yes'?'K (price N/A)':(s.fuel[f]==='no'?'unavailable':'unknown')}</strong> <button class="report-btn" data-fuel="${f}" data-id="${s.id}">report</button></div>`; }).join(''); const amenitiesHtml=s.amenities.map(a=>`<span class="amenity-tag">${a}</span>`).join(' '); const modalHtml=`<h2>${s.name}</h2><p><i class="fas fa-map-pin"></i> ${s.address} (${s.distance?.toFixed(1)} km)</p><div class="fuel-list">${fuelRows}</div><div>${amenitiesHtml}</div><div style="display:flex; gap:8px; margin-top:16px;"><button class="action-btn navigate-btn" id="modalNav">Navigate</button><button class="action-btn" id="modalFav"><i class="${s.favorite?'fas':'far'} fa-heart"></i> Fav</button><button class="action-btn" id="modalShare">Share</button></div>`; document.getElementById('modalContent').innerHTML=modalHtml; document.getElementById('modalNav').onclick=()=>startNavigation(s.lat,s.lon,s.name); document.getElementById('modalFav').onclick=()=>toggleFavorite(s.id); document.getElementById('modalShare').onclick=()=>navigator.share?.({title:s.name})||alert('Share demo'); document.querySelectorAll('.report-btn').forEach(btn=>btn.onclick=()=>alert(`Report price for ${btn.dataset.fuel} (demo)`)); document.getElementById('stationModal').classList.add('show'); }
        
        function startNavigation(destLat,destLon,name){ document.getElementById('stationModal').classList.remove('show'); if(!userLocation) return; if(routingControl) map.removeControl(routingControl); routingControl=L.Routing.control({ waypoints:[L.latLng(userLocation.lat,userLocation.lng),L.latLng(destLat,destLon)], routeWhileDragging:false, fitSelectedRoutes:true, lineOptions:{styles:[{color:'#16a34a',weight:5}]} }).addTo(map); document.getElementById('clearRouteBtn').style.display='flex'; }
        
        async function reverseGeocodeRoad(lat,lng){ try{ const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`); const data=await res.json(); const road=data.address?.road||data.address?.pedestrian||data.address?.suburb||'local road'; currentRoad=road; document.getElementById('roadLocation').innerHTML=`<i class="fas fa-road"></i> ${road.substring(0,28)}`; } catch(e){ currentRoad='unknown road'; document.getElementById('roadLocation').innerHTML=`<i class="fas fa-road"></i> road: approx`; } }
        
        async function updateCityName(lat,lng){ try{ const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10`); const data=await res.json(); const city=data.address?.city||data.address?.town||data.address?.village||'Zambia'; document.getElementById('cityDisplay').innerHTML=`<i class="fas fa-map-pin"></i> ${city}`; await reverseGeocodeRoad(lat,lng); } catch(e){ document.getElementById('cityDisplay').innerHTML=`<i class="fas fa-map-pin"></i> Lusaka`; } }
        
        function locateAndFetch(){ if(!navigator.geolocation) return; document.getElementById('userLocationStatus')&&(document.getElementById('userLocationStatus').innerText='locating'); navigator.geolocation.getCurrentPosition(async pos=>{ userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude}; if(userMarker) map.removeLayer(userMarker); userMarker=L.circleMarker([userLocation.lat,userLocation.lng],{radius:7,color:'#16a34a',fillColor:'#16a34a',fillOpacity:0.9}).addTo(map).bindPopup('You').openPopup(); map.setView([userLocation.lat,userLocation.lng],14); await updateCityName(userLocation.lat,userLocation.lng); await loadStations(true); }, err=>alert('Location error'),{enableHighAccuracy:true}); }
        
        function showFuelStationsList(){ const sorted=getFilteredStations(); const container=document.getElementById('fuelStationsList'); if(!sorted.length) container.innerHTML='<p>No stations found</p>'; else{ container.innerHTML=sorted.map(s=>`<div class="station-card" data-id="${s.id}"><div style="display:flex; justify-content:space-between;"><span class="station-name">${s.name}</span><span>${s.distance?.toFixed(1)} km</span></div><div class="address">${s.address}</div><div class="fuel-badges">${['petrol','diesel'].map(f=>`<span class="fuel-badge ${s.fuel[f]==='yes'?'available':(s.fuel[f]==='no'?'unavailable':'unknown')}">${f.toUpperCase()}</span>`).join('')}</div></div>`).join(''); container.querySelectorAll('.station-card').forEach(c=>c.addEventListener('click',()=>{ document.getElementById('fuelStationsModal').classList.remove('show'); openStationModal(parseInt(c.dataset.id)); })); } document.getElementById('fuelStationsModal').classList.add('show'); }
        
        function initMap(){ map=L.map('map').setView([-13.133,27.849],6); L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap'}).addTo(map); clusterGroup=L.markerClusterGroup({chunkedLoading:true}); map.addLayer(clusterGroup); }
        
        // sidebar
        const sidebar=document.getElementById('sidebarOverlay');
        document.getElementById('menuBtn').onclick=()=>sidebar.classList.add('open');
        document.getElementById('closeSidebarBtn').onclick=()=>sidebar.classList.remove('open');
        sidebar.addEventListener('click',e=>{ if(e.target===sidebar) sidebar.classList.remove('open'); });
        document.querySelectorAll('.sidebar-item').forEach(item=>{ item.onclick=()=>{ const act=item.dataset.action; sidebar.classList.remove('open'); if(act==='search') document.getElementById('searchModal').classList.add('show'); if(act==='refresh'){ if(userLocation) loadStations(true); else locateAndFetch(); } if(act==='fav'){ document.getElementById('favModal').classList.add('show'); const favStations=stations.filter(s=>favoriteIds.includes(s.id)); document.getElementById('favListModal').innerHTML=favStations.length?favStations.map(s=>`<div class="station-card" data-id="${s.id}"><strong>${s.name}</strong> <button class="action-btn" data-id="${s.id}" style="background:#fee2e2;">remove fav</button></div>`).join(''):'<p>No favorites</p>'; document.querySelectorAll('#favListModal .station-card').forEach(c=>c.addEventListener('click',e=>{ if(!e.target.closest('button')) openStationModal(parseInt(c.dataset.id)); })); document.querySelectorAll('#favListModal .action-btn').forEach(btn=>btn.onclick=()=>toggleFavorite(parseInt(btn.dataset.id))); } if(act==='profile') document.getElementById('profileModal').classList.add('show'); if(act==='settings') alert('⚙️ Settings demo: report prices, units'); if(act==='logout') alert('Logged out (demo)'); }; });
        
        // event binding
        document.getElementById('nearMeBtn').onclick=locateAndFetch;
        document.getElementById('floatLocateBtn').onclick=()=>{ if(userLocation) map.setView([userLocation.lat,userLocation.lng],15); else locateAndFetch(); };
        document.getElementById('floatRefreshBtn').onclick=()=>{ if(userLocation) loadStations(true); };
        document.getElementById('radiusSlider').oninput=(e)=>{ radiusKm=parseFloat(e.target.value); document.getElementById('radiusDisplay').innerText=radiusKm+' km'; if(userLocation) loadStations(false); };
        document.getElementById('searchInput').oninput=(e)=>{ searchQuery=e.target.value; renderMarkers(); updateUIcounters(); };
        document.getElementById('clearSearchBtn').onclick=()=>{ document.getElementById('searchInput').value=''; searchQuery=''; renderMarkers(); updateUIcounters(); };
        document.querySelectorAll('.chip').forEach(chip=>{ chip.onclick=()=>{ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); currentFilter=chip.dataset.filter; renderMarkers(); updateUIcounters(); }; });
        document.getElementById('citySearchBtn').onclick=async()=>{ const q=document.getElementById('citySearchInput').value; if(!q) return; try{ const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+', Zambia')}&limit=1`); const data=await res.json(); if(data.length){ map.setView([parseFloat(data[0].lat),parseFloat(data[0].lon)],12); } else alert('City not found'); }catch(e){ alert('Geocoding error'); } };
        document.getElementById('overlayMapBtn').onclick=()=>{ const wrap=document.getElementById('mapWrapper'); if(wrap.requestFullscreen) wrap.requestFullscreen(); else if(wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen(); };
        document.getElementById('clearRouteBtn').onclick=()=>{ if(routingControl){ map.removeControl(routingControl); routingControl=null; document.getElementById('clearRouteBtn').style.display='none'; } };
        document.getElementById('floatingFuelBtn').onclick=showFuelStationsList;
        document.getElementById('closeFuelStationsBtn').onclick=()=>document.getElementById('fuelStationsModal').classList.remove('show');
        document.getElementById('closeModalBtn').onclick=()=>document.getElementById('stationModal').classList.remove('show');
        document.getElementById('closeSearchModal').onclick=()=>document.getElementById('searchModal').classList.remove('show');
        document.getElementById('closeFavModal').onclick=()=>document.getElementById('favModal').classList.remove('show');
        document.getElementById('closeProfileModal').onclick=()=>document.getElementById('profileModal').classList.remove('show');
        document.getElementById('searchFuelInput').addEventListener('input',e=>{ const val=e.target.value; const filtered=stations.filter(s=>s.name.toLowerCase().includes(val.toLowerCase())||s.address.toLowerCase().includes(val.toLowerCase())).slice(0,12); document.getElementById('searchResultsModal').innerHTML=filtered.map(s=>`<div class="station-card" data-id="${s.id}"><strong>${s.name}</strong> ${s.distance?.toFixed(1)}km</div>`).join(''); document.querySelectorAll('#searchResultsModal .station-card').forEach(c=>c.onclick=()=>{ document.getElementById('searchModal').classList.remove('show'); openStationModal(parseInt(c.dataset.id)); }); });
        document.getElementById('showCreateForm').onclick=()=>{ document.getElementById('createAccountForm').style.display='block'; document.getElementById('loginForm').style.display='none'; };
        document.getElementById('showLoginForm').onclick=()=>{ document.getElementById('loginForm').style.display='block'; document.getElementById('createAccountForm').style.display='none'; };
        
        initMap();
        locateAndFetch();
    })();
    </script>
</body>
</html>
