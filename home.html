<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>FuelRadar · Zambia</title>
    <!-- PWA primary color -->
    <meta name="theme-color" content="#16a34a">
    <link rel="manifest" href="manifest.json">
    <!-- Leaflet, routing, marker cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            background: #ffffff;
            overflow: hidden;
            font-size: 93.5%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: none;
            overflow: hidden;
            box-shadow: none;
        }

        /* ----- LOADING OVERLAY (unchanged) ----- */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        #loadingOverlay.hide {
            opacity: 0;
            visibility: hidden;
        }
        #loadingOverlay.shrink {
            top: 10px;
            left: 10px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: transparent;
            box-shadow: none;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .loading-logo {
            width: 160px;
            height: auto;
            border-radius: 24px;
            background: white;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,150,0,0.3);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse 1.5s infinite ease-in-out;
        }
        #loadingOverlay.shrink .loading-logo {
            width: 50px;
            padding: 6px;
            border-radius: 12px;
            animation: none;
            box-shadow: 0 4px 12px rgba(0,150,0,0.3);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* ----- HEADER (prominent location detail) ----- */
        .header {
            padding: 12px 16px 6px 16px;
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-img {
            height: 40px;
            width: auto;
            border-radius: 12px;
            background: white;
            padding: 4px;
            box-shadow: 0 4px 10px rgba(0,150,0,0.25);
            object-fit: contain;
        }
        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: #0a2a1f;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #166534, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* larger, centered location detail */
        .location-detail {
            font-size: 18px;          /* increased size */
            font-weight: 600;
            color: #14532d;
            margin: 10px 0 4px 0;
            display: flex;
            align-items: center;
            justify-content: center;   /* centered */
            gap: 10px;
            background: #f0fdf4;
            padding: 12px 18px;        /* more padding */
            border-radius: 60px;
            border: 2px solid #bbf7d0;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,80,0,0.1);
        }
        .location-detail i {
            color: #16a34a;
            font-size: 22px;
        }
        #userLocationRoad {
            font-weight: 700;
            color: #0f3b1e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- CUSTOM CAR SLIDER (road style) ----- */
        .radius-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 16px;
            padding: 8px 12px;
            background: #f8faf8;
            border-radius: 40px;
            border: 1px dashed #86efac;
        }
        .car-slider-container {
            flex: 1;
            position: relative;
            height: 40px;
            display: flex;
            align-items: center;
        }
        .road-line {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #14532d 0px, #14532d 6px, transparent 6px, transparent 12px);
            border-radius: 2px;
        }
        .car-thumb {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,100,0,0.5);
            cursor: grab;
            transition: left 0.02s linear;
            left: 0%;
            margin-left: -18px;
            border: 2px solid white;
        }
        .car-thumb:active {
            cursor: grabbing;
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* ----- FILTER TABS ----- */
        .filter-section {
            padding: 6px 16px;
        }
        .filter-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 2px 0;
        }
        .chip {
            background: white;
            color: #1e3a1e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: #16a34a;
            color: white;
            border-color: #14532d;
        }
        .chip-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 2px 6px;
            margin-left: 4px;
            font-size: 10px;
        }

        /* ----- MAP WRAPPER ----- */
        .map-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid white;
            border-top: 2px solid white;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
        }
        .map-floating-buttons {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .map-left-buttons {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .float-btn {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 8px 16px rgba(0,80,0,0.3);
            border: none;
            color: #16a34a;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .float-btn.clear-route {
            color: #dc2626;
            display: none;
        }
        .overlay-btn {
            background: #16a34a;
            color: white;
            font-size: 14px;
            font-weight: 700;
            width: auto;
            padding: 0 16px;
            border-radius: 40px;
            gap: 6px;
        }

        /* ----- BOTTOM NAV ----- */
        .bottom-nav {
            background: #ffffff;
            border-top: 1px solid #c0e0c0;
            padding: 6px 8px 10px 8px;
            display: flex;
            justify-content: space-around;
            flex-shrink: 0;
            box-shadow: 0 -4px 10px rgba(0,20,0,0.05);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4b6b4b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item.active { color: #16a34a; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        /* ----- FULL-PAGE FUEL STATION MODAL (with search) ----- */
        .full-page-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        .full-page-modal.show {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: white;
            padding: 12px 0;
            z-index: 10;
            border-bottom: 1px solid #e0f0e0;
        }
        .modal-header h2 {
            font-size: 24px;
            color: #166534;
        }
        .close-modal-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #16a34a;
            cursor: pointer;
            margin-left: auto;
        }
        /* search bar inside fuel modal */
        .fuel-search {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 2px solid #bbf7d0;
            background: #f9fff9;
            font-size: 16px;
            margin: 10px 0 20px 0;
            outline: none;
            transition: 0.2s;
        }
        .fuel-search:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.2);
        }
        .station-list-full {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 30px;
        }
        .station-card-full {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 12px 20px -8px rgba(0,60,0,0.2);
            border: 1px solid #e0f0e0;
        }
        .station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .station-name {
            font-weight: 800;
            font-size: 18px;
            color: #0c3b1e;
        }
        .open-badge {
            background: #22c55e;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
        }
        .closed-badge {
            background: #a16207;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
        }
        .station-details {
            margin: 8px 0;
            font-size: 13px;
            color: #2c4a2c;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .amenities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }
        .amenity-tag {
            background: rgba(22,163,74,0.15);
            color: #14532d;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #86efac;
        }
        .directions-btn {
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 18px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }

        /* ----- OTHER MODALS (unchanged) ----- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,30,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 40px;
            padding: 28px 24px;
            box-shadow: 0 40px 60px rgba(0,100,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }
        .photo-upload {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .photo-upload label {
            background: #f0fdf4;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px dashed #16a34a;
            cursor: pointer;
            font-size: 13px;
        }
        .photo-upload input {
            display: none;
        }

        /* ----- DIRECTIONS PANEL ----- */
        .leaflet-routing-container {
            background: white !important;
            border-radius: 24px !important;
            padding: 16px !important;
            box-shadow: 0 10px 30px rgba(0,60,0,0.3) !important;
            border: 1px solid #bbf7d0 !important;
            font-family: inherit !important;
            max-height: 300px !important;
            overflow-y: auto !important;
        }
        .leaflet-routing-alt {
            border-bottom: 1px solid #e0f0e0 !important;
        }
        .leaflet-routing-geocoders {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay">
        <img src="logo.png" alt="FuelRadar" class="loading-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="app-container" id="appContainer" style="display: none;">
        <!-- HEADER -->
        <div class="header">
            <div class="header-row">
                <img src="logo.png" alt="FuelRadar" class="logo-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                <span class="header-title">FUELRADAR</span>
                <div style="width: 40px;"></div>
            </div>
            <!-- enlarged centered location detail -->
            <div class="location-detail" id="locationDetail">
                <i class="fas fa-map-pin"></i>
                <span id="userLocationRoad">Detecting location...</span>
            </div>
        </div>

        <!-- CAR RADIUS SLIDER (default 5km) -->
        <div class="radius-row">
            <div class="car-slider-container" id="carSliderContainer">
                <div class="road-line"></div>
                <div class="car-thumb" id="carThumb"><i class="fas fa-car-side"></i></div>
            </div>
            <span class="radius-value" id="radiusDisplay">5 km</span>
        </div>

        <!-- FILTER TABS -->
        <div class="filter-section">
            <div class="filter-scroll" id="filterTabs">
                <button class="chip active" data-filter="all">All <span class="chip-count" id="countAll">0</span></button>
                <button class="chip" data-filter="available">Available <span class="chip-count" id="countAvailable">0</span></button>
                <button class="chip" data-filter="petrol">Petrol <span class="chip-count" id="countPetrol">0</span></button>
                <button class="chip" data-filter="diesel">Diesel <span class="chip-count" id="countDiesel">0</span></button>
            </div>
        </div>

        <!-- MAP WRAPPER -->
        <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
            <div class="map-left-buttons">
                <button class="float-btn overlay-btn" id="overlayMapBtn"><i class="fas fa-expand-alt"></i> expand</button>
            </div>
            <div class="map-floating-buttons">
                <button class="float-btn locate" id="floatLocateBtn" title="My location"><i class="fas fa-crosshairs"></i></button>
                <button class="float-btn clear-route" id="clearRouteBtn" title="Clear route"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <div class="bottom-nav">
            <div class="nav-item active" id="navMap"><i class="fas fa-map"></i><span>Map</span></div>
            <div class="nav-item" id="navFuelStations"><i class="fas fa-gas-pump"></i><span>Stations</span></div>
            <div class="nav-item" id="navFav"><i class="fas fa-heart"></i><span>Fav</span></div>
            <div class="nav-item" id="navProfile"><i class="fas fa-user"></i><span>Profile</span></div>
        </div>
    </div>

    <!-- FULL-PAGE FUEL STATION MODAL (with search) -->
    <div class="full-page-modal" id="fuelStationModal">
        <div class="modal-header">
            <h2><i class="fas fa-gas-pump" style="color:#16a34a;"></i> Fuel Stations</h2>
            <button class="close-modal-btn" id="closeFuelModal"><i class="fas fa-times"></i></button>
        </div>
        <!-- search input -->
        <input type="text" class="fuel-search" id="fuelSearchInput" placeholder="🔍 Search fuel station..." autocomplete="off">
        <div class="station-list-full" id="fuelStationFullList">
            <!-- populated dynamically -->
        </div>
    </div>

    <!-- OTHER MODALS (unchanged) -->
    <div class="modal-overlay" id="stationModal"><div class="modal-content"><button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button><div id="modalContent"></div></div></div>
    <div class="modal-overlay" id="favModal"><div class="modal-content"><button class="modal-close" id="closeFavModal"><i class="fas fa-times"></i></button><h2><i class="fas fa-heart" style="color:#dc2626;"></i> Favorites</h2><div id="favList" style="margin-top:16px;"></div></div></div>
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content">
            <button class="modal-close" id="closeProfileModal"><i class="fas fa-times"></i></button>
            <div style="text-align:center;">
                <img src="logo.png" style="width:80px; border-radius:50%; background:#16a34a; padding:10px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'white\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                <h3>FuelRadar Zambia</h3>
            </div>
            <div style="display:flex; gap:10px; margin:20px 0;">
                <button id="showCreateForm" class="action-btn" style="flex:1; background:#16a34a; color:white;">Create</button>
                <button id="showLoginForm" class="action-btn" style="flex:1;">Log in</button>
            </div>
            <div id="createAccountForm" style="display:none;">
                <input placeholder="Full name" class="action-btn" style="width:100%; margin-bottom:10px;">
                <input placeholder="Phone" class="action-btn" style="width:100%; margin-bottom:10px;">
                <input placeholder="Email" class="action-btn" style="width:100%; margin-bottom:10px;">
                <input type="password" placeholder="Password" class="action-btn" style="width:100%; margin-bottom:10px;">
                <div class="photo-upload">
                    <label><i class="fas fa-camera"></i> Profile photo <input type="file" accept="image/*"></label>
                    <label><i class="fas fa-car"></i> Car photo 1 <input type="file" accept="image/*"></label>
                    <label><i class="fas fa-car"></i> Car photo 2 <input type="file" accept="image/*"></label>
                </div>
                <button class="action-btn navigate-btn" style="width:100%;">Register (demo)</button>

            <div id="loginForm" style="display:none;">
                <input placeholder="Email" class="action-btn" style="width:100%; margin-bottom:10px;">
                <input type="password" placeholder="Password" class="action-btn" style="width:100%; margin-bottom:10px;">
                <button class="action-btn navigate-btn" style="width:100%;">Log in (demo)</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- LOADING OVERLAY ----------
            const overlay = document.getElementById('loadingOverlay');
            const appContainer = document.getElementById('appContainer');
            setTimeout(() => {
                overlay.classList.add('shrink');
                setTimeout(() => {
                    overlay.classList.add('hide');
                    appContainer.style.display = 'flex';
                }, 800);
            }, 5000);

            // ---------- GLOBAL STATE ----------
            let stations = [];
            let userLocation = null;
            let currentFilter = 'all';
            let radiusKm = 5;               // default 5km
            let map, clusterGroup, routingControl = null;
            let userMarker = null;
            let favoriteIds = JSON.parse(localStorage.getItem('fuelWatchFavs')) || [];
            let roadAddress = '';
            let searchTerm = '';             // for fuel page search

            // Custom slider elements
            const carThumb = document.getElementById('carThumb');
            const sliderContainer = document.getElementById('carSliderContainer');
            const radiusDisplay = document.getElementById('radiusDisplay');
            let isDragging = false;

            // ---------- HELPER FUNCTIONS ----------
            const haversine = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const updateDistances = () => {
                if (!userLocation) return;
                stations.forEach(s => { s.distance = haversine(userLocation.lat, userLocation.lng, s.lat, s.lon); });
            };

            function isOpenNow(openingHours) {
                if (!openingHours || openingHours === 'unknown') return null;
                const oh = openingHours.toLowerCase();
                if (oh.includes('24/7') || oh.includes('24 7')) return true;
                return null;
            }

            function getPhotoUrl(tags) {
                if (tags.image) return tags.image;
                if (tags.wikimedia_commons) {
                    let file = tags.wikimedia_commons.replace(/^File:/, '');
                    return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}?width=300`;
                }
                if (tags.photo) return tags.photo;
                return null;
            }

            function getFuelStatus(tags) {
                const fuel = { petrol: null, diesel: null, lpg: null, cng: null };
                if (tags['fuel:petrol'] === 'yes' || tags['fuel:petrol'] === '24/7') fuel.petrol = 'yes';
                else if (tags['fuel:petrol'] === 'no') fuel.petrol = 'no';
                if (tags['fuel:diesel'] === 'yes' || tags['fuel:diesel'] === '24/7') fuel.diesel = 'yes';
                else if (tags['fuel:diesel'] === 'no') fuel.diesel = 'no';
                if (tags['fuel:lpg'] === 'yes') fuel.lpg = 'yes';
                else if (tags['fuel:lpg'] === 'no') fuel.lpg = 'no';
                if (tags['fuel:cng'] === 'yes') fuel.cng = 'yes';
                else if (tags['fuel:cng'] === 'no') fuel.cng = 'no';
                return fuel;
            }

            function overallStatus(fuel) {
                const values = [fuel.petrol, fuel.diesel, fuel.lpg, fuel.cng].filter(v => v !== null);
                if (values.includes('yes')) return 'available';
                if (values.length > 0 && values.every(v => v === 'no')) return 'empty';
                return 'unknown';
            }

            function extractAmenities(tags) {
                let amenities = [];
                if (tags.shop) amenities.push(`🛒 Shop: ${tags.shop}`);
                if (tags.pharmacy) amenities.push(`💊 Pharmacy`);
                if (tags.atm === 'yes') amenities.push(`🏧 ATM`);
                if (tags.car_wash === 'yes') amenities.push(`🧼 Car wash`);
                if (tags.amenity === 'restaurant') amenities.push(`🍽️ Restaurant`);
                if (tags.amenity === 'fast_food') amenities.push(`🍔 Fast food`);
                if (tags.amenity === 'cafe') amenities.push(`☕ Cafe`);
                if (tags.toilets === 'yes') amenities.push(`🚻 Toilets`);
                if (tags['brand:wikidata']) amenities.push(`⛽ Branded`);
                return amenities.length ? amenities : ['⛽ Fuel station'];
            }

            // Overpass API query
            async function fetchStations(lat, lon, radius) {
                const query = `[out:json];(node["amenity"="fuel"](around:${radius*1000},${lat},${lon});way["amenity"="fuel"](around:${radius*1000},${lat},${lon}););out body;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const elements = data.elements;
                    const stationMap = new Map();
                    elements.forEach(el => {
                        let name = el.tags?.name || el.tags?.brand || "Fuel station";
                        let lat = el.lat || (el.center && el.center.lat);
                        let lon = el.lon || (el.center && el.center.lon);
                        if (!lat || !lon) return;
                        const id = el.id;
                        if (!stationMap.has(id)) {
                            let addr = [];
                            if (el.tags?.['addr:housenumber']) addr.push(el.tags['addr:housenumber']);
                            if (el.tags?.['addr:street']) addr.push(el.tags['addr:street']);
                            if (el.tags?.['addr:city']) addr.push(el.tags['addr:city']);
                            let address = addr.join(', ') || 'local road';
                            let openingHours = el.tags?.opening_hours || (el.tags?.['24/7'] ? '24/7' : 'unknown');

                            stationMap.set(id, {
                                id: id,
                                name: name,
                                address: address,
                                lat, lon,
                                tags: el.tags || {},
                                openingHours: openingHours,
                                fuel: getFuelStatus(el.tags || {}),
                                amenities: extractAmenities(el.tags || {}),
                                photoUrl: getPhotoUrl(el.tags || {}),
                                lastUpdated: new Date().toLocaleTimeString() + ' (OSM)',
                                favorite: favoriteIds.includes(id)
                            });
                        }
                    });
                    let newStations = Array.from(stationMap.values());
                    newStations = newStations.map(s => {
                        s.status = overallStatus(s.fuel);
                        return s;
                    });
                    return newStations;
                } catch (e) {
                    console.warn("Overpass error", e);
                    return [];
                }
            }

            // Car icon for user location
            function getCarIcon() {
                return L.divIcon({
                    html: `<i class="fas fa-car" style="color: #16a34a; font-size: 36px; filter: drop-shadow(0 4px 6px black);"></i>`,
                    iconSize: [36, 36],
                    className: 'user-car-marker'
                });
            }

            function getIconForStatus(status) {
                let color = (status === 'available') ? '#16a34a' : (status === 'empty' ? '#dc2626' : '#3b82f6');
                return L.divIcon({
                    html: `<i class="fas fa-gas-pump" style="color: ${color}; font-size: 26px; filter: drop-shadow(0 2px 6px #00000040);"></i>`,
                    iconSize: [30, 30],
                    className: 'fuel-marker'
                });
            }

            async function loadStations(showSpinner = true) {
                if (!userLocation) return;
                stations = await fetchStations(userLocation.lat, userLocation.lng, radiusKm);
                updateDistances();
                renderCardsAndMarkers();
                updateFilterCounts();
            }

            function getFilteredStations() {
                let filtered = stations.slice();
                if (currentFilter !== 'all') {
                    if (currentFilter === 'available') {
                        filtered = filtered.filter(s => s.status === 'available');
                    } else {
                        filtered = filtered.filter(s => s.fuel[currentFilter] === 'yes');
                    }
                }
                filtered.sort((a,b) => (a.distance || 999) - (b.distance || 999));
                return filtered;
            }

            function updateFilterCounts() {
                const total = stations.length;
                const available = stations.filter(s => s.status === 'available').length;
                const petrol = stations.filter(s => s.fuel.petrol === 'yes').length;
                const diesel = stations.filter(s => s.fuel.diesel === 'yes').length;
                document.getElementById('countAll').innerText = total;
                document.getElementById('countAvailable').innerText = available;
                document.getElementById('countPetrol').innerText = petrol;
                document.getElementById('countDiesel').innerText = diesel;
            }

            // Render map markers
            function renderCardsAndMarkers() {
                const filtered = getFilteredStations();
                if (clusterGroup) {
                    clusterGroup.clearLayers();
                    filtered.forEach(s => {
                        const marker = L.marker([s.lat, s.lon], { icon: getIconForStatus(s.status) })
                            .bindPopup(`<b>${s.name}</b><br>${s.status==='available'?'✅ fuel in stock':'⛔ no fuel'}`);
                        marker.on('click', () => openModal(s.id));
                        clusterGroup.addLayer(marker);
                    });
                }
            }

            // ---------- CUSTOM SLIDER (default 5km) ----------
            function initCarSlider() {
                const min = 1, max = 8;
                const updateRadiusFromPos = (clientX) => {
                    const rect = sliderContainer.getBoundingClientRect();
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const percent = x / rect.width;
                    const value = min + percent * (max - min);
                    radiusKm = Math.round(value * 10) / 10;
                    radiusDisplay.innerText = radiusKm + ' km';
                    carThumb.style.left = percent * 100 + '%';
                    if (userLocation) loadStations(false);
                };

                carThumb.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    e.preventDefault();
                });
                window.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    updateRadiusFromPos(e.clientX);
                });
                window.addEventListener('mouseup', () => {
                    isDragging = false;
                });
                carThumb.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    e.preventDefault();
                });
                window.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    updateRadiusFromPos(e.touches[0].clientX);
                });
                window.addEventListener('touchend', () => {
                    isDragging = false;
                });
                // initial position at 5km
                const initialPercent = ((5 - min) / (max - min)) * 100;
                carThumb.style.left = initialPercent + '%';
            }

            // ---------- LOCATION DETECTION (detailed road) ----------
            async function updateDetailedAddress(lat, lon) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                    const data = await res.json();
                    const addr = data.address;
                    const road = addr.road || addr.pedestrian || addr.street || '';
                    const suburb = addr.suburb || addr.neighbourhood || '';
                    const city = addr.city || addr.town || addr.village || 'Zambia';
                    let locationString = `${city}`;
                    if (suburb) locationString += `, ${suburb}`;
                    if (road) locationString += `, ${road}`;
                    document.getElementById('userLocationRoad').innerText = locationString;
                    roadAddress = locationString;
                } catch (e) {
                    document.getElementById('userLocationRoad').innerText = 'Location detected';
                }
            }

            function locateUser(forcePermission = false) {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) {
                        alert('Geolocation not supported');
                        reject();
                        return;
                    }
                    navigator.permissions.query({ name: 'geolocation' }).then(perm => {
                        if (perm.state === 'denied') {
                            alert('Location access denied. Please enable in settings.');
                            reject();
                        } else {
                            navigator.geolocation.getCurrentPosition(
                                async (pos) => {
                                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                                    if (userMarker) map.removeLayer(userMarker);
                                    // replace with car icon
                                    userMarker = L.marker([userLocation.lat, userLocation.lng], { icon: getCarIcon() })
                                        .addTo(map)
                                        .bindPopup('You are here')
                                        .openPopup();
                                    map.setView([userLocation.lat, userLocation.lng], 13);
                                    await updateDetailedAddress(userLocation.lat, userLocation.lng);
                                    await loadStations(true);
                                    resolve();
                                },
                                (err) => {
                                    alert('Location error: ' + err.message);
                                    reject(err);
                                },
                                { enableHighAccuracy: true, timeout: 10000 }
                            );
                        }
                    });
                });
            }

            // ---------- INIT MAP ----------
            function initMap() {
                map = L.map('map').setView([-13.133, 27.849], 6);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
                clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
                map.addLayer(clusterGroup);
            }

            // ---------- NAVIGATION ----------
            function startNavigation(destLat, destLon, destName) {
                document.getElementById('stationModal').classList.remove('show');
                document.getElementById('fuelStationModal').classList.remove('show');
                if (!userLocation) { alert('Location not available'); return; }
                if (routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(userLocation.lat, userLocation.lng), L.latLng(destLat, destLon)],
                    routeWhileDragging: false,
                    fitSelectedRoutes: true,
                    lineOptions: { styles: [{ color: '#16a34a', weight: 5 }] },
                    showAlternatives: false,
                    createMarker: () => null,
                    addWaypoints: false,
                }).addTo(map);
                document.getElementById('clearRouteBtn').style.display = 'flex';
            }

            // ---------- MODAL FUNCTIONS ----------
            function openModal(id) {
                const s = stations.find(s => s.id === id);
                if (!s) return;
                const fuelRows = ['petrol','diesel','lpg','cng'].map(f => {
                    let statusIcon = '';
                    if (s.fuel[f] === 'yes') statusIcon = '✅';
                    else if (s.fuel[f] === 'no') statusIcon = '❌';
                    else statusIcon = '❓';
                    return `<div style="display:flex; justify-content:space-between; margin:4px 0;"><span><i class="fas fa-gas-pump"></i> ${f.toUpperCase()}</span> <strong>${statusIcon} ${s.fuel[f] === 'yes' ? 'K (real price N/A)' : (s.fuel[f] === 'no' ? 'unavailable' : 'unknown')}</strong></div>`;
                }).join('');
                const amenitiesHtml = s.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join(' ');
                const photoHtml = s.photoUrl ? `<img src="${s.photoUrl}" class="station-photo" style="width:100%; height:160px; object-fit:cover; border-radius:24px; margin:12px 0;" onerror="this.style.display='none'">` : `<div style="height:120px; background:#cbd5e1; border-radius:24px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-gas-pump" style="font-size:40px; color:#fff;"></i></div>`;
                const openStatus = isOpenNow(s.openingHours);
                const openBadge = openStatus === true ? '<span class="open-now-badge">OPEN NOW</span>' : (openStatus === false ? '<span class="open-now-badge" style="background:#a16207;">CLOSED</span>' : '');
                const modalHtml = `
                    <h2 style="font-size:24px; margin-bottom:2px;">${s.name} ${openBadge}</h2>
                    <p style="color:#2c4a2c; font-size:14px;"><i class="fas fa-map-pin"></i> ${s.address} (${s.distance?.toFixed(1)} km)</p>
                    ${photoHtml}
                    <div class="fuel-list" style="background:#f0fdf4; border-radius:24px; padding:16px; margin:16px 0;">
                        <h4 style="margin-bottom:6px;">⛽ Fuel availability</h4>
                        ${fuelRows}
                    </div>
                    <div style="margin: 14px 0;">
                        <h4 style="font-size:14px;"><i class="fas fa-store-alt"></i> Amenities</h4>
                        <div style="margin-top:6px;">${amenitiesHtml || '— none reported —'}</div>
                    </div>
                    <p style="font-size:9px; color:#6b7e6b;">last sync: ${s.lastUpdated}</p>
                    <div style="display:flex; gap:8px; margin-top:16px;">
                        <button class="action-btn navigate-btn" id="modalNav"><i class="fas fa-route"></i> Navigate</button>
                        <button class="action-btn" id="modalFav"><i class="${s.favorite ? 'fas' : 'far'} fa-heart"></i> Fav</button>
                    </div>
                `;
                document.getElementById('modalContent').innerHTML = modalHtml;
                document.getElementById('modalNav').addEventListener('click', () => startNavigation(s.lat, s.lon, s.name));
                document.getElementById('modalFav').addEventListener('click', () => toggleFavorite(s.id));
                document.getElementById('stationModal').classList.add('show');
            }

            function toggleFavorite(id) {
                const s = stations.find(s => s.id === id);
                if (s) { 
                    s.favorite = !s.favorite; 
                    if (s.favorite) { if (!favoriteIds.includes(id)) favoriteIds.push(id); } 
                    else { favoriteIds = favoriteIds.filter(fid => fid !== id); }
                    localStorage.setItem('fuelWatchFavs', JSON.stringify(favoriteIds));
                    renderCardsAndMarkers(); 
                }
            }

            // ---------- FUEL STATION PAGE (with search) ----------
            function renderFuelStationList() {
                const modal = document.getElementById('fuelStationModal');
                const list = document.getElementById('fuelStationFullList');
                let filtered = getFilteredStations();
                // apply search term
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.toLowerCase().trim();
                    filtered = filtered.filter(s => s.name.toLowerCase().includes(term));
                }
                if (filtered.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:#4b6b4b;">No stations found.</p>';
                } else {
                    list.innerHTML = filtered.map(s => {
                        const openStatus = isOpenNow(s.openingHours);
                        const openBadge = openStatus === true ? '<span class="open-badge">OPEN</span>' : (openStatus === false ? '<span class="closed-badge">CLOSED</span>' : '<span class="closed-badge" style="background:#6b7e6b;">UNKNOWN</span>');
                        const eta = s.distance ? Math.round(s.distance / 50 * 60) : null;
                        const etaText = eta ? `${eta} min` : '?';
                        const amenitiesPreview = s.amenities.slice(0,4).map(a => `<span class="amenity-tag">${a}</span>`).join('');
                        return `
                            <div class="station-card-full" data-id="${s.id}">
                                <div class="station-header">
                                    <span class="station-name">${s.name}</span>
                                    ${openBadge}
                                </div>
                                <div class="station-details">
                                    <span><i class="fas fa-route"></i> ${s.distance?.toFixed(1)} km</span>
                                    <span><i class="fas fa-clock"></i> ${etaText} drive</span>
                                </div>
                                <div class="amenities-list">${amenitiesPreview}</div>
                                <button class="directions-btn" data-id="${s.id}"><i class="fas fa-map-signal"></i> Directions</button>
                            </div>
                        `;
                    }).join('');
                    // attach directions events
                    list.querySelectorAll('.directions-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = parseInt(btn.dataset.id);
                            const station = stations.find(s => s.id === id);
                            if (station) {
                                modal.classList.remove('show');
                                startNavigation(station.lat, station.lon, station.name);
                            }
                        });
                    });
                }
            }

            function showFuelStationPage() {
                renderFuelStationList();
                document.getElementById('fuelStationModal').classList.add('show');
            }

            // ---------- EVENT LISTENERS ----------
            document.addEventListener('DOMContentLoaded', () => {
                initMap();
                initCarSlider();

                locateUser().catch(() => {});

                // Nav events
                document.getElementById('navMap').addEventListener('click', () => {
                    document.querySelectorAll('.full-page-modal, .modal-overlay').forEach(m => m.classList.remove('show'));
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.getElementById('navMap').classList.add('active');
                });
                document.getElementById('navFuelStations').addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.getElementById('navFuelStations').classList.add('active');
                    showFuelStationPage();
                });
                document.getElementById('closeFuelModal').addEventListener('click', () => {
                    document.getElementById('fuelStationModal').classList.remove('show');
                });
                // Search input listener
                document.getElementById('fuelSearchInput').addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    renderFuelStationList();
                });

                document.getElementById('navFav').addEventListener('click', () => {
                    const favStations = stations.filter(s => favoriteIds.includes(s.id));
                    const container = document.getElementById('favList');
                    if (favStations.length===0) container.innerHTML = '<p>No favorites yet</p>';
                    else {
                        container.innerHTML = favStations.map(s => `
                            <div class="station-card" style="padding:12px; margin-bottom:8px;" data-id="${s.id}">
                                <div style="display:flex; justify-content:space-between;"><strong>${s.name}</strong> <span>${s.distance?.toFixed(1)} km</span></div>
                                <button class="favorite-icon" data-id="${s.id}"><i class="fas fa-heart" style="color:#dc2626;"></i> remove</button>
                            </div>
                        `).join('');
                        container.querySelectorAll('.favorite-icon').forEach(btn => {
                            btn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(parseInt(btn.dataset.id)); document.getElementById('navFav').click(); });
                        });
                        container.querySelectorAll('.station-card').forEach(card => {
                            card.addEventListener('click', (e) => { if(!e.target.closest('button')) openModal(parseInt(card.dataset.id)); });
                        });
                    }
                    document.getElementById('favModal').classList.add('show');
                });
                document.getElementById('navProfile').addEventListener('click', () => {
                    document.getElementById('profileModal').classList.add('show');
                });

                document.getElementById('floatLocateBtn').addEventListener('click', () => {
                    if (userLocation) map.setView([userLocation.lat, userLocation.lng], 15);
                    else locateUser();
                });
                document.getElementById('clearRouteBtn').addEventListener('click', () => {
                    if (routingControl) { map.removeControl(routingControl); routingControl = null; document.getElementById('clearRouteBtn').style.display = 'none'; }
                });
                document.getElementById('overlayMapBtn').addEventListener('click', () => {
                    const mapWrapper = document.getElementById('mapWrapper');
                    if (!document.fullscreenElement) {
                        mapWrapper.requestFullscreen();
                        document.getElementById('overlayMapBtn').innerHTML = '<i class="fas fa-compress-alt"></i> collapse';
                    } else {
                        document.exitFullscreen();
                        document.getElementById('overlayMapBtn').innerHTML = '<i class="fas fa-expand-alt"></i> expand';
                    }
                });
                document.addEventListener('fullscreenchange', () => {
                    if (!document.fullscreenElement) {
                        document.getElementById('overlayMapBtn').innerHTML = '<i class="fas fa-expand-alt"></i> expand';
                    }
                });

                // Filter chips
                document.querySelectorAll('.chip').forEach(chip => {
                    chip.addEventListener('click', (e) => {
                        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        currentFilter = chip.dataset.filter;
                        renderCardsAndMarkers();
                        // if fuel modal is open, update list
                        if (document.getElementById('fuelStationModal').classList.contains('show')) {
                            renderFuelStationList();
                        }
                    });
                });

                // Close modals
                document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('stationModal').classList.remove('show'));
                document.getElementById('closeFavModal').addEventListener('click', () => document.getElementById('favModal').classList.remove('show'));
                document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('show'));
                window.addEventListener('click', e => { 
                    if (e.target.classList.contains('modal-overlay')) 
                        document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show')); 
                });

                // Profile form toggles
                document.getElementById('showCreateForm').addEventListener('click', () => { 
                    document.getElementById('createAccountForm').style.display = 'block'; 
                    document.getElementById('loginForm').style.display = 'none'; 
                });
                document.getElementById('showLoginForm').addEventListener('click', () => { 
                    document.getElementById('loginForm').style.display = 'block'; 
                    document.getElementById('createAccountForm').style.display = 'none'; 
                });
            });
        })();
    </script>
</body>
