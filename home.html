<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
    <title>FuelRadar · Zambia · before your tank runs dry</title>
    <!-- Leaflet, routing, marker cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100%;
            overflow: hidden;
            font-size: 100%;
        }

        .app-container {
            width: 100%;
            max-width: 528px;
            background: #ffffff;
            box-shadow: none;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
            overflow: hidden;
            position: relative;
        }

        /* Header with top-left driver icon, centered brand, top-right logo */
        .header {
            padding: 10px 16px 6px 16px;
            background: #ffffff;
            border-bottom: 1px solid rgba(0,80,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .driver-left {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }
        .driver-left img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .brand-center {
            flex: 1;
            text-align: center;
        }
        .brand-center h1 {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.3px;
        }
        .brand-center h1 .fuel-green {
            color: #16a34a;
        }
        .brand-center h1 .radar-red {
            color: #dc2626;
        }
        .slogan {
            font-size: 11px;
            font-weight: 700;
            color: #16a34a;
            background: #eef5e8;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 2px;
        }
        .logo-right {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-right img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .stats-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 11px;
            background: #f9fafb;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
        }
        .stats-row span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .road-badge, .city-badge-sm {
            background: #eef2ff;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .menu-btn {
            background: #f0fdf4;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            font-size: 18px;
            color: #16a34a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .city-search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            background: #f0fdf4;
            border-radius: 40px;
            padding: 4px 4px 4px 14px;
            border: 1px solid #bbf7d0;
        }
        .city-search-row i {
            color: #16a34a;
        }
        .city-search-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 0;
            font-size: 13px;
            outline: none;
        }
        .city-search-row button {
            background: #16a34a;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
        }

        /* Custom radius slider with horizontal car icon (front right) - size increased 30% */
        .radius-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            background: #ffffff;
            padding: 4px 0;
        }
        .radius-label {
            font-size: 12px;
            font-weight: 600;
            color: #2c5e2c;
        }
        .slider-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="range"].car-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #d9f0d9;
            border-radius: 10px;
            outline: none;
        }
        input[type="range"].car-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 49px;
            height: 49px;
            background: url('driver.png') no-repeat center center;
            background-size: contain;
            cursor: pointer;
            border: none;
            transform: rotate(0deg);
            border-radius: 0;
            box-shadow: none;
            background-color: transparent;
        }
        input[type="range"].car-slider::-moz-range-thumb {
            width: 49px;
            height: 49px;
            background: url('driver.png') no-repeat center center;
            background-size: contain;
            border: none;
            border-radius: 0;
            background-color: transparent;
            transform: rotate(0deg);
        }
        .radius-value {
            background: #16a34a;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
        }

        .search-section {
            padding: 6px 16px 6px 16px;
            background: white;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 30px;
            padding: 6px 14px;
            border: 1px solid rgba(0,150,0,0.25);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 6px 4px;
            font-size: 14px;
            outline: none;
        }
        .near-me-row {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }
        .near-me-btn {
            background: #16a34a;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,80,0,0.2);
        }

        .filter-section {
            padding: 6px 16px;
            background: white;
        }
        .filter-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0;
        }
        .chip {
            background: white;
            color: #1e3a1e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(22,163,74,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        .chip.active {
            background: #16a34a;
            color: white;
            border-color: #14532d;
        }
        .chip-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 2px 6px;
            margin-left: 5px;
            font-size: 10px;
        }

        .map-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            border-radius: 0;
            overflow: hidden;
            background: #cbd5e1;
            min-height: 0;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
        }
        .map-floating-buttons {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .map-top-right {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 1000;
        }
        .float-btn {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 12px rgba(0,80,0,0.3);
            border: none;
            color: #16a34a;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .float-btn.clear-route {
            color: #dc2626;
            display: none;
        }
        .overlay-top {
            background: #16a34a;
            color: white;
        }

        /* Floating fuel stations pill - bright red icon */
        .floating-fuel-pill {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 18px rgba(0,100,0,0.4);
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .floating-fuel-pill i {
            font-size: 20px;
            color: #ff3333;
        }

        /* Station card style (for list) */
        .station-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 6px 14px rgba(0,60,0,0.1);
            border: 1px solid #e0f0e0;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.1s;
        }
        .station-name {
            font-weight: 800;
            font-size: 16px;
            color: #0c3b1e;
        }
        .address {
            font-size: 11px;
            color: #2c4a2c;
            margin: 4px 0 6px 0;
            display: flex;
            gap: 5px;
        }
        .fuel-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 6px 0 4px 0;
        }
        .fuel-badge {
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .fuel-badge.available { background: #16a34a; color: white; }
        .fuel-badge.unavailable { background: #dc2626; color: white; }
        .fuel-badge.unknown { background: #3b82f6; color: white; }
        .nav-btn-sm {
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Modal enhancements - improved styling */
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-close {
            float: right;
            background: #f3f4f6;
            border: none;
            font-size: 22px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #4b5563;
            transition: 0.1s;
        }
        .modal-close:hover {
            background: #e5e7eb;
        }
        .station-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .station-header i {
            font-size: 32px;
            color: #16a34a;
            background: #eef5e8;
            padding: 8px;
            border-radius: 50%;
        }
        .station-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: #0c3b1e;
            margin: 0;
        }
        .location-details {
            background: #f9fafb;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .address-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #2c5e2c;
        }
        .distance-eta {
            background: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .fuel-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .fuel-item {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.1s;
        }
        .fuel-name {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fuel-status {
            font-size: 13px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 30px;
            background: white;
        }
        .fuel-status.available { color: #16a34a; background: #e6f7e6; }
        .fuel-status.unavailable { color: #dc2626; background: #fee2e2; }
        .fuel-status.unknown { color: #3b82f6; background: #e0f2fe; }
        .fuel-price {
            font-weight: 800;
            font-size: 16px;
            color: #1f3a1f;
        }
        .amenities-section {
            margin: 20px 0 16px;
        }
        .amenities-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .amenities-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .amenity-badge {
            background: #f3f4f6;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1f3a1f;
            border: 1px solid #e0e7e0;
        }
        .amenity-badge i {
            color: #16a34a;
            font-size: 14px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .action-btn {
            flex: 1;
            border-radius: 40px;
            padding: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .navigate-btn {
            background: #16a34a;
            color: white;
        }
        .fav-btn {
            background: #fee2e2;
            color: #b91c1c;
        }
        .share-btn {
            background: #f3f4f6;
            color: #374151;
        }

        /* sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 3000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .sidebar-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -4px 0 24px rgba(0,0,0,0.2);
            z-index: 3001;
            transition: right 0.25s ease-out;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .sidebar-overlay.open .sidebar-panel {
            right: 0;
        }
        .sidebar-logo {
            text-align: center;
            padding: 20px 0 10px 0;
        }
        .sidebar-logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
        .sidebar-header {
            padding: 12px 20px;
            border-bottom: 1px solid #e0f0e0;
            font-size: 18px;
            font-weight: 800;
            color: #16a34a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-menu {
            flex: 1;
            padding: 16px 0;
        }
        .sidebar-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #1e3a1e;
            cursor: pointer;
        }
        .sidebar-item i {
            width: 24px;
            font-size: 18px;
            color: #16a34a;
        }
        .sidebar-item:hover { background: #f0fdf4; }

        /* Profile modal form styling */
        #createAccountForm input, #loginForm input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 40px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
        }
        #createAccountForm input:focus, #loginForm input:focus {
            border-color: #16a34a;
        }
        #createAccountForm, #loginForm {
            margin-top: 16px;
        }
        .spinner { border: 3px solid #e2f3e2; border-top: 3px solid #16a34a; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: white;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .progress-container {
            width: 70%;
            height: 20px;
            background: #e6f0e6;
            border-radius: 60px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #16a34a;
            transition: width 0.05s linear;
        }
        .price-fetch-note {
            font-size: 9px;
            color: #6b7280;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <img src="logo.png" alt="FuelRadar" style="width:100px; margin-bottom:20px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
        <div class="progress-container"><div class="progress-bar" id="loadingBar"></div></div>
        <div id="loadingPercent" style="font-weight:800; margin-top:10px;">0%</div>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <div class="driver-left">
                    <img src="driver.png" alt="driver" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                </div>
                <div class="brand-center">
                    <h1><span class="fuel-green">Fuel</span><span class="radar-red">Radar</span></h1>
                    <div class="slogan"><i class="fas fa-gas-pump"></i> before your tank runs dry</div>
                </div>
                <div class="logo-right">
                    <img src="logo.png" alt="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2316a34a\'%3E%3Cpath d=\'M5,20h14v2H5V20z M19,18h-1.5l-0.5-2h-3l-0.5,2H9.5L9,16H6l-1,4H3l4-13h2l4,13h-2l-0.8-2h3.6l-0.8,2h2l4-13h2L19,18z M10.3,12l1.7-5l1.7,5H10.3z\'/%3E%3C/svg%3E';">
                </div>
            </div>
            <div class="stats-row">
                <span><i class="fas fa-map-marker-alt"></i> <span id="stationCountHeader">0 stations</span></span>
                <span><i class="fas fa-road"></i> <span id="roadLocation" class="road-badge">road: —</span></span>
                <span><i class="fas fa-city"></i> <span id="cityDisplay" class="city-badge-sm">Lusaka</span></span>
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            </div>
            <div class="city-search-row">
                <i class="fas fa-search"></i>
                <input type="text" id="citySearchInput" placeholder="Search city (e.g. Ndola)">
                <button id="citySearchBtn">Go</button>
            </div>
            <div class="radius-row">
                <span class="radius-label"><i class="fas fa-car"></i> radius</span>
                <div class="slider-container">
                    <input type="range" min="1" max="8" step="0.5" value="3" class="car-slider" id="radiusSlider">
                </div>
                <span class="radius-value" id="radiusDisplay">3 km</span>
            </div>
        </div>
