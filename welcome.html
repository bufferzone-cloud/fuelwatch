<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
  <title>FuelRadar · Welcome</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .welcome-container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: 20px;
    }

    .logo-wrapper img {
      width: 170px;
      height: auto;
      display: block;
    }

    /* Welcome heading */
    .welcome-title {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    /* Country badge – flag at the end */
    .country-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #f1f5f9;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 500;
      color: #0f172a;
      margin-bottom: 40px;
      border: 1px solid #e2e8f0;
    }

    .country-flag {
      font-size: 22px;
      line-height: 1;
      margin-left: 4px;
    }

    /* Horizontal button row */
    .action-buttons {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }

    /* Apple‑style buttons */
    .apple-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 12px;
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      background: #16a34a;
      box-shadow: 0 6px 16px rgba(22, 163, 74, 0.2);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .apple-btn i {
      font-size: 20px;
    }

    .apple-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(22, 163, 74, 0.3);
      background: #158a3e;
    }

    .apple-btn:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(22, 163, 74, 0.25);
    }

    /* Station button variant */
    .apple-btn.station {
      background: #1e293b;
      box-shadow: 0 6px 16px rgba(30, 41, 59, 0.2);
    }

    .apple-btn.station:hover {
      background: #0f172a;
      box-shadow: 0 10px 24px rgba(30, 41, 59, 0.3);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      border-top-color: #16a34a;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer note */
    .footer-note {
      margin-top: 36px;
      font-size: 13px;
      color: #94a3b8;
    }

    .footer-note a {
      color: #16a34a;
      text-decoration: none;
      font-weight: 500;
    }

    /* Responsive: stack vertically only on very small screens if needed, but we want horizontal */
    @media (max-width: 380px) {
      .apple-btn {
        font-size: 16px;
        padding: 14px 8px;
      }
      .welcome-title {
        font-size: 24px;
      }
    }

    /* Ensure buttons stay side‑by‑side even on narrow phones */
    @media (max-width: 360px) {
      .action-buttons {
        gap: 8px;
      }
      .apple-btn i {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <!-- Logo -->
    <div class="logo-wrapper">
      <img src="logo.png" alt="FuelRadar Logo" id="logoImage" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 80\'%3E%3Crect width=\'200\' height=\'80\' rx=\'20\' fill=\'%2316a34a\'/%3E%3Ctext x=\'30\' y=\'52\' font-family=\'Arial\' font-size=\'36\' font-weight=\'bold\' fill=\'white\'%3EFuel%3C/text%3E%3Ctext x=\'106\' y=\'52\' font-family=\'Arial\' font-size=\'36\' font-weight=\'bold\' fill=\'%23dc2626\'%3ERadar%3C/text%3E%3C/svg%3E'">
    </div>

    <!-- Welcome message -->
    <h1 class="welcome-title">Welcome to FuelRadar</h1>
    
    <!-- Country display (flag at end) -->
    <div class="country-badge" id="countryDisplay">
      <span class="spinner" id="loadingSpinner"></span>
      <span id="countryNameText">Detecting country...</span>
      <span class="country-flag" id="countryFlagEmoji"></span>
    </div>

    <!-- Action buttons (horizontal) -->
    <div class="action-buttons">
      <button class="apple-btn" id="driverBtn">
        <i class="fas fa-car"></i>
        Driver
      </button>
      <button class="apple-btn station" id="stationBtn">
        <i class="fas fa-gas-pump"></i>
        Station
      </button>
    </div>

    <div class="footer-note">
      By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // DOM elements
      const countryNameText = document.getElementById('countryNameText');
      const countryFlagEmoji = document.getElementById('countryFlagEmoji');
      const loadingSpinner = document.getElementById('loadingSpinner');
      const driverBtn = document.getElementById('driverBtn');
      const stationBtn = document.getElementById('stationBtn');

      // Default fallback
      let detectedCountry = {
        code: 'US',
        name: 'United States',
        flag: '🇺🇸'
      };

      // Helper: get flag emoji from country code
      function getFlagEmoji(countryCode) {
        if (!countryCode) return '🌍';
        const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
        return String.fromCodePoint(...codePoints);
      }

      // Country detection using ipapi.co (reliable and free)
      async function detectUserCountry() {
        try {
          // Try primary service
          const response = await fetch('https://ipapi.co/json/');
          if (!response.ok) throw new Error('ipapi.co failed');
          const data = await response.json();
          
          detectedCountry = {
            code: data.country_code || 'US',
            name: data.country_name || 'United States',
            flag: getFlagEmoji(data.country_code)
          };
        } catch (error) {
          console.warn('Primary country detection failed, trying fallback...', error);
          try {
            // Fallback to ip-api.com (also free, no API key)
            const fallbackRes = await fetch('https://ip-api.com/json/');
            if (fallbackRes.ok) {
              const fbData = await fallbackRes.json();
              detectedCountry = {
                code: fbData.countryCode || 'US',
                name: fbData.country || 'United States',
                flag: getFlagEmoji(fbData.countryCode)
              };
            }
          } catch (fbError) {
            console.warn('Fallback country detection also failed. Using default.');
            // Keep default US
          }
        } finally {
          updateCountryUI();
        }
      }

      function updateCountryUI() {
        // Hide spinner
        if (loadingSpinner) loadingSpinner.style.display = 'none';
        
        // Update text and flag (flag at end)
        countryNameText.textContent = detectedCountry.name;
        countryFlagEmoji.textContent = detectedCountry.flag;
      }

      // Navigation
      function navigateTo(page) {
        window.location.href = page;
      }

      // Event listeners
      driverBtn.addEventListener('click', () => {
        navigateTo('home.html');
      });

      stationBtn.addEventListener('click', () => {
        navigateTo('station.html');
      });

      // Start detection immediately
      detectUserCountry();

      // Optional prefetch for performance
      const pages = ['home.html', 'station.html'];
      pages.forEach(href => {
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = href;
        document.head.appendChild(link);
      });
    })();
  </script>
</body>
</html>
