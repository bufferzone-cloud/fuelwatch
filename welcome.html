<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes">
  <title>FuelRadar · Welcome</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FuelRadar">
  <link rel="apple-touch-icon" href="logo.png">
  
  <!-- Theme color (dark to match black transparency vibe) -->
  <meta name="theme-color" content="#111315">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    /* FULL BACKGROUND: welcome.png + black transparency (65% visible)
       The linear-gradient with rgba(0,0,0,0.35) reduces image visibility to 65%
       (100% - 35% darkening = 65% visible). Image covers entire viewport. */
    body {
      min-height: 100vh;
      background: url('welcome.png') center center / cover no-repeat fixed;
      background-color: #0a0c10; /* fallback while loading */
      position: relative;
    }
    
    /* Black transparency overlay as a pseudo-element ensures consistent darkening
       and also makes the image look "black & 65% visible". Using background blend would
       be alternative, but overlay gives full control over contrast. */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);  /* 35% black -> 65% of original image visible */
      backdrop-filter: brightness(0.96);
      z-index: 0;
      pointer-events: none;
    }

    /* All main content sits above the overlay */
    .content-overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .welcome-container {
      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ----- Country greeting (country name above + flag + welcome text) ----- */
    .greeting-card {
      margin: 0 0 32px 0;
      width: 100%;
    }

    .welcome-tagline {
      background: rgba(20, 28, 32, 0.55);
      backdrop-filter: blur(12px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 80px;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
      border: none;
    }

    .country-flag-lg {
      font-size: 36px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
      line-height: 1;
    }

    .country-greeting-text {
      font-size: 1.3rem;
      font-weight: 620;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      letter-spacing: -0.2px;
      background: linear-gradient(135deg, #fafcff, #eef4ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: none;
    }
    
    /* For better readability we use direct white with slight gradient */
    .country-greeting-text span {
      background: linear-gradient(120deg, #f0f9ff, #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    /* alternative fallback for older browsers: solid white */
    @supports not (background-clip: text) {
      .country-greeting-text {
        color: white;
      }
    }

    .loading-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 8px 20px;
      font-size: 1rem;
      color: #fffbee;
    }

    /* ------ GLASS & FLOATING BUTTONS (Driver / Station) ------ */
    .action-buttons {
      display: flex;
      flex-direction: row;
      gap: 20px;
      width: 100%;
      justify-content: center;
      margin: 12px 0 6px;
    }

    /* Glassmorphism + elevated float effect */
    .glass-float-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 12px;
      border: none;
      border-radius: 80px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
      background: rgba(25, 32, 36, 0.7);
      backdrop-filter: blur(14px);
      box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-decoration: none;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .glass-float-btn i {
      font-size: 1.35rem;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
    }

    /* Floating effect: lift + enhanced shadow */
    .glass-float-btn:hover {
      transform: translateY(-6px);
      background: rgba(35, 45, 50, 0.8);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 36px -14px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
      border-color: rgba(255,255,255,0.35);
    }

    .glass-float-btn:active {
      transform: translateY(2px);
      transition: 0.05s linear;
      box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.4);
    }

    /* subtle accent for station button (no big change, just identity) */
    .glass-float-btn.station-gloss {
      background: rgba(20, 28, 32, 0.72);
    }

    /* Footer note — fits dark aesthetic */
    .footer-note {
      margin-top: 48px;
      font-size: 13px;
      font-weight: 500;
      color: #f0f3f8;
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 60px;
      letter-spacing: 0.2px;
    }

    .footer-note a {
      color: #b9f3e2;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .footer-note a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* spinner for detection state */
    .mini-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,240,0.5);
      border-radius: 50%;
      border-top-color: #d4f1f9;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive touches */
    @media (max-width: 520px) {
      .welcome-container {
        max-width: 100%;
      }
      .glass-float-btn {
        padding: 14px 10px;
        font-size: 1rem;
        gap: 8px;
      }
      .country-greeting-text {
        font-size: 1.1rem;
      }
      .country-flag-lg {
        font-size: 30px;
      }
      .welcome-tagline {
        padding: 10px 20px;
        gap: 8px;
      }
      .action-buttons {
        gap: 14px;
      }
    }

    @media (max-width: 400px) {
      .glass-float-btn {
        font-size: 0.9rem;
        padding: 12px 6px;
      }
      .welcome-tagline {
        flex-wrap: wrap;
      }
    }

    /* remove any logo remnants: no logo element */
  </style>
</head>
<body>
  <div class="content-overlay">
    <div class="welcome-container">
      
      <!-- NO logo — removed as requested -->
      
      <!-- Country name displayed ABOVE with "Welcome to FuelRadar (detected country + flag)" -->
      <div class="greeting-card" id="greetingSection">
        <div class="welcome-tagline" id="dynamicGreeting">
          <span class="country-flag-lg" id="greetingFlagEmoji">🌍</span>
          <span class="country-greeting-text" id="greetingTextBlock">
            Welcome to FuelRadar · <span id="countryNameDynamic">locating...</span>
          </span>
        </div>
      </div>

      <!-- GLASS & FLOATING buttons (Driver / Station) with modern float glassmorphism -->
      <div class="action-buttons">
        <button class="glass-float-btn" id="driverBtn">
          <i class="fas fa-car-side"></i>
          Driver
        </button>
        <button class="glass-float-btn station-gloss" id="stationBtn">
          <i class="fas fa-gas-pump"></i>
          Station
        </button>
      </div>

      <div class="footer-note">
        By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- PWA: Register Service Worker ----------
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }

      // DOM elements for dynamic country display (flag + country name inside welcome greeting)
      const greetingFlagSpan = document.getElementById('greetingFlagEmoji');
      const countryNameSpan = document.getElementById('countryNameDynamic');
      const greetingContainer = document.getElementById('dynamicGreeting');

      // Country data structure
      let detectedCountry = {
        code: 'US',
        name: 'United States',
        flag: '🇺🇸'
      };

      // Helper: get flag emoji from country code (ISO alpha-2)
      function getFlagEmoji(countryCode) {
        if (!countryCode || countryCode.length !== 2) return '🏁';
        const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
        return String.fromCodePoint(...codePoints);
      }

      // update the UI: flag and country name inside "Welcome to FuelRadar · Country"
      function updateCountryUI() {
        if (greetingFlagSpan) greetingFlagSpan.textContent = detectedCountry.flag;
        if (countryNameSpan) countryNameSpan.textContent = detectedCountry.name;
      }

      // Show loading state while detecting country
      function setLoadingState() {
        if (greetingFlagSpan) greetingFlagSpan.textContent = '🌐';
        if (countryNameSpan) countryNameSpan.innerHTML = '<span class="mini-spinner"></span> detecting...';
      }

      // Country detection using ipapi.co with fallback ip-api.com
      async function detectUserCountry() {
        setLoadingState();
        try {
          // Primary API: ipapi.co (fast, reliable, free)
          const response = await fetch('https://ipapi.co/json/');
          if (!response.ok) throw new Error('ipapi.co failed');
          const data = await response.json();
          
          detectedCountry = {
            code: data.country_code || 'US',
            name: data.country_name || 'United States',
            flag: getFlagEmoji(data.country_code)
          };
        } catch (error) {
          console.warn('Primary detection error, using fallback (ip-api.com)...', error);
          try {
            const fallbackRes = await fetch('https://ip-api.com/json/');
            if (fallbackRes.ok) {
              const fbData = await fallbackRes.json();
              detectedCountry = {
                code: fbData.countryCode || 'US',
                name: fbData.country || 'United States',
                flag: getFlagEmoji(fbData.countryCode)
              };
            } else {
              throw new Error('fallback API response not ok');
            }
          } catch (fbError) {
            console.warn('Fallback detection failed, keeping default region.', fbError);
            // Keep US as a safe default, but also attempt to keep nice flag
            detectedCountry = {
              code: 'US',
              name: 'United States',
              flag: '🇺🇸'
            };
          }
        } finally {
          updateCountryUI();
        }
      }

      // Navigation functions (driver -> home.html, station -> station.html)
      function navigateTo(page) {
        window.location.href = page;
      }

      // Bind events to glass buttons
      const driverButton = document.getElementById('driverBtn');
      const stationButton = document.getElementById('stationBtn');
      
      if (driverButton) {
        driverButton.addEventListener('click', (e) => {
          e.preventDefault();
          navigateTo('home.html');
        });
      }
      if (stationButton) {
        stationButton.addEventListener('click', (e) => {
          e.preventDefault();
          navigateTo('station.html');
        });
      }

      // Start country detection immediately
      detectUserCountry();

      // Prefetch target pages for faster navigation (UX)
      const pagesToPrefetch = ['home.html', 'station.html'];
      pagesToPrefetch.forEach(href => {
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = href;
        document.head.appendChild(link);
      });

      // Additional background image robustness: if welcome.png fails to load, we provide a subtle fallback
      // but black transparency overlay remains. This ensures the background doesn't look broken.
      // Since no direct img tag, we check preemptively: we can apply a fallback background if needed.
      // Because body background uses url(welcome.png), we add an onerror-like handling via JS (optional)
      // This is purely for resilience: try to detect if background image is missing by testing a dummy image.
      const testImg = new Image();
      testImg.onerror = function() {
        // If welcome.png cannot be loaded, apply a dark gradient fallback to keep elegant design.
        document.body.style.background = "linear-gradient(145deg, #0a140e, #0f1a1c) center center / cover";
        console.log('welcome.png missing, applied dark gradient fallback but black overlay stays active');
      };
      testImg.src = 'welcome.png';
      
    })();
  </script>
</body>
</html>
